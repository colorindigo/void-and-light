<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA MONO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0.13;}
#back-btn{position:fixed;top:16px;left:20px;z-index:200;background:transparent;border:none;color:#333;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.2s;}
#back-btn:hover{color:#aaa;}
#canvas{display:block;position:fixed;inset:0;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);}
.hud-val{font-size:0.72rem;letter-spacing:0.2em;opacity:0.6;}
.hud-val span{color:#fff;opacity:1;font-size:1rem;display:block;margin-top:2px;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(10,10,10,0.92);}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.screen p{font-size:0.65rem;letter-spacing:0.2em;opacity:0.3;text-align:center;line-height:2;}
.screen-btn{padding:11px 32px;background:transparent;border:1px solid #333;color:#888;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.screen-btn:hover{border-color:#aaa;color:#fff;}
.diff-row{display:flex;gap:12px;}
.diff-btn{padding:8px 20px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:0.68rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.diff-btn:hover{border-color:#777;color:#ccc;}
.diff-btn.active{border-color:#aaa;color:#fff;}
.diff-label{font-size:0.58rem;letter-spacing:0.2em;opacity:0.25;}
.lives{display:flex;gap:10px;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .hud-val{font-size:0.88rem;} .hud-val span{font-size:1.2rem;}
  .screen h1{font-size:2.4rem;} .screen p{font-size:0.8rem;}
  .screen-btn{font-size:0.9rem;} .diff-btn{font-size:0.82rem;padding:9px 24px;}
  #back-btn{font-size:0.8rem;}
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<button id="back-btn" onclick="window.location.href='../'">&#8592; MONO GAMES</button>
<canvas id="canvas"></canvas>
<div id="hud" style="display:none">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES<div class="lives" id="lives-val"></div></div>
</div>
<div class="screen" id="start-screen">
  <h1>GALAGA MONO</h1>
  <p>ARROW KEYS or A/D &mdash; MOVE<br>SPACE &mdash; FIRE<br>SURVIVE THE FORMATION</p>
  <div class="diff-label">DIFFICULTY</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('normal',this)">NORMAL</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>
<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../'">MENU</button>
</div>
<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function rn(){nc.width=innerWidth;nc.height=innerHeight;}
rn();window.addEventListener('resize',()=>{rn();resize();});
function dn(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(dn,80);

const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();

const IS_RETINA=window.devicePixelRatio>=2;
const PLAYER_W=IS_RETINA?44:30,PLAYER_H=IS_RETINA?36:24;
const BULLET_W=IS_RETINA?1:0.8,BULLET_H=IS_RETINA?7:5;
const EBULLET_W=IS_RETINA?1:0.8,EBULLET_H=IS_RETINA?6:4;
const ENEMY_SIZE=IS_RETINA?27:19,SPACING=IS_RETINA?50:34;
const BASE_COLS=11,BASE_ROWS=4;

let AC=null;
function ensureAudio(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}catch(e){}}

// ── Menu Music ──
const menuAudio=new Audio('main menu.wav');
menuAudio.loop=true;menuAudio.volume=0;
let menuFadeInterval=null,menuPlaying=false;
function fadeMenuIn(){
  if(menuPlaying)return;menuAudio.volume=0;menuPlaying=true;
  const p=menuAudio.play();if(p)p.catch(()=>{menuPlaying=false;});
  clearInterval(menuFadeInterval);
  menuFadeInterval=setInterval(()=>{if(menuAudio.volume<0.25)menuAudio.volume=Math.min(0.25,menuAudio.volume+0.005);else clearInterval(menuFadeInterval);},30);
}
function fadeMenuOut(){
  if(!menuPlaying)return new Promise(r=>r());
  return new Promise(resolve=>{clearInterval(menuFadeInterval);menuFadeInterval=setInterval(()=>{if(menuAudio.volume>0.01)menuAudio.volume=Math.max(0,menuAudio.volume-0.008);else{clearInterval(menuFadeInterval);menuAudio.pause();menuAudio.currentTime=0;menuPlaying=false;resolve();}},30);});
}
fadeMenuIn();

// ── Stage Music ──
const STAGE_FILES={stage1:'stage I.mp3',stage2:'stage II.mp3'};
const STAGE_VOL=0.22,FADE_IN=2.0,FADE_OUT=1.2;
let stageBuffers={},stageTrack=null,stageLoading=null,stageLoaded=false;
function loadStageMusic(){if(stageLoaded)return Promise.resolve();if(stageLoading)return stageLoading;if(!AC)return Promise.resolve();stageLoading=Promise.all(Object.keys(STAGE_FILES).map(n=>fetch(STAGE_FILES[n]).then(r=>{if(!r.ok)throw new Error(r.status);return r.arrayBuffer();}).then(buf=>AC.decodeAudioData(buf)).then(d=>{stageBuffers[n]=d;}).catch(e=>console.warn(n,e)))).then(()=>{stageLoaded=true;});return stageLoading;}
function playStageTrack(name){if(!AC||!stageBuffers[name])return;if(AC.state==='suspended')AC.resume();const src=AC.createBufferSource(),gain=AC.createGain();src.buffer=stageBuffers[name];src.loop=true;gain.gain.setValueAtTime(0,AC.currentTime);gain.gain.linearRampToValueAtTime(STAGE_VOL,AC.currentTime+FADE_IN);src.connect(gain);gain.connect(AC.destination);src.start(0);stageTrack={source:src,gain:gain,name:name};}
function stopStageTrack(){return new Promise(resolve=>{if(!stageTrack||!AC){resolve();return;}const t=AC.currentTime,g=stageTrack.gain;g.gain.cancelScheduledValues(t);g.gain.setValueAtTime(g.gain.value,t);g.gain.linearRampToValueAtTime(0,t+FADE_OUT);const ref=stageTrack;stageTrack=null;setTimeout(()=>{try{ref.source.stop();}catch(e){}resolve();},FADE_OUT*1000+100);});}
function playStageMusic(wn){if(!AC)return;const name=(wn%2===1)?'stage1':'stage2';if(stageTrack&&stageTrack.name===name)return;loadStageMusic().then(()=>stopStageTrack().then(()=>playStageTrack(name)));}
function stopAllMusic(){fadeMenuOut();stopStageTrack();}

// ── SFX ──
let ambientStarted=false;
function startAmbient(){if(!AC||ambientStarted)return;ambientStarted=true;const m=AC.createGain();m.gain.setValueAtTime(0.09,AC.currentTime);m.connect(AC.destination);[55,55.3].forEach(f=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime(0.5,AC.currentTime);o.connect(g);g.connect(m);o.start();});const sub=AC.createOscillator(),sg=AC.createGain();sub.type='sine';sub.frequency.setValueAtTime(27.5,AC.currentTime);sg.gain.setValueAtTime(0.4,AC.currentTime);sub.connect(sg);sg.connect(m);sub.start();const bs=AC.sampleRate*2,bf=AC.createBuffer(1,bs,AC.sampleRate),dd=bf.getChannelData(0);for(let i=0;i<bs;i++)dd[i]=Math.random()*2-1;const ns=AC.createBufferSource();ns.buffer=bf;ns.loop=true;const nf=AC.createBiquadFilter();nf.type='bandpass';nf.frequency.setValueAtTime(120,AC.currentTime);nf.Q.value=0.5;const ng=AC.createGain();ng.gain.setValueAtTime(0.06,AC.currentTime);ns.connect(nf);nf.connect(ng);ng.connect(m);ns.start();const lfo=AC.createOscillator(),lg=AC.createGain();lfo.frequency.setValueAtTime(0.08,AC.currentTime);lg.gain.setValueAtTime(0.06,AC.currentTime);lfo.connect(lg);lg.connect(m.gain);lfo.start();schedulePings(m);}
function schedulePings(d){if(!AC||!d)return;setTimeout(()=>{if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(220+Math.random()*660,AC.currentTime);g.gain.setValueAtTime(0,AC.currentTime);g.gain.linearRampToValueAtTime(0.04,AC.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+2.5);o.connect(g);g.connect(d);o.start();o.stop(AC.currentTime+2.6);schedulePings(d);},(4+Math.random()*8)*1000);}
function sndShoot(){if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(880,AC.currentTime);o.frequency.exponentialRampToValueAtTime(220,AC.currentTime+0.08);g.gain.setValueAtTime(0.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.08);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.09);}
function sndHit(){if(!AC)return;const bs=Math.floor(AC.sampleRate*0.06),bf=AC.createBuffer(1,bs,AC.sampleRate),d=bf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const s=AC.createBufferSource();s.buffer=bf;const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(1800,AC.currentTime);f.Q.value=1.2;const g=AC.createGain();g.gain.setValueAtTime(0.3,AC.currentTime);s.connect(f);f.connect(g);g.connect(AC.destination);s.start();s.stop(AC.currentTime+0.07);}
function sndEnemyDie(){if(!AC)return;const bs=Math.floor(AC.sampleRate*0.12),bf=AC.createBuffer(1,bs,AC.sampleRate),d=bf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const s=AC.createBufferSource();s.buffer=bf;const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(600,AC.currentTime);f.Q.value=0.8;const g=AC.createGain();g.gain.setValueAtTime(0.22,AC.currentTime);s.connect(f);f.connect(g);g.connect(AC.destination);s.start();s.stop(AC.currentTime+0.13);}
function sndExplode(){if(!AC)return;const bs=Math.floor(AC.sampleRate*0.6),bf=AC.createBuffer(1,bs,AC.sampleRate),d=bf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;const s=AC.createBufferSource();s.buffer=bf;const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(400,AC.currentTime);f.frequency.exponentialRampToValueAtTime(60,AC.currentTime+0.5);const g=AC.createGain();g.gain.setValueAtTime(0.6,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.6);s.connect(f);f.connect(g);g.connect(AC.destination);s.start();s.stop(AC.currentTime+0.65);const o=AC.createOscillator(),og=AC.createGain();o.type='sine';o.frequency.setValueAtTime(80,AC.currentTime);o.frequency.exponentialRampToValueAtTime(20,AC.currentTime+0.4);og.gain.setValueAtTime(0.5,AC.currentTime);og.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.45);o.connect(og);og.connect(AC.destination);o.start();o.stop(AC.currentTime+0.5);}

let firstClick=false;
function onFirstClick(){if(firstClick)return;firstClick=true;ensureAudio();startAmbient();if(!menuPlaying)fadeMenuIn();if(AC)loadStageMusic();}
document.addEventListener('click',onFirstClick);
document.addEventListener('keydown',onFirstClick);
document.addEventListener('touchstart',onFirstClick);

// ═══════════════════════════════
// ── GAME BALANCE ──
// ═══════════════════════════════
const DIFF={
  easy:{shootMin:700,shootRnd:900,bulletSpd:IS_RETINA?1.2:0.8,maxDivers:1,maxBullets:4,formSpeed:0.15,shooterPct:0.2,diveSpd:IS_RETINA?2.0:1.5,lives:5},
  normal:{shootMin:400,shootRnd:500,bulletSpd:IS_RETINA?2.0:1.4,maxDivers:2,maxBullets:8,formSpeed:0.28,shooterPct:0.45,diveSpd:IS_RETINA?3.0:2.2,lives:3},
  hard:{shootMin:180,shootRnd:220,bulletSpd:IS_RETINA?3.2:2.3,maxDivers:4,maxBullets:14,formSpeed:0.38,shooterPct:0.7,diveSpd:IS_RETINA?3.8:2.8,lives:2},
};

function waveRamp(w){if(w<=1)return 0;if(w<=4)return(w-1)*0.15;return 0.45+(w-4)*0.1;}

let difficulty='easy',D=DIFF[difficulty];
let W_shootMin,W_shootRnd,W_bulletSpd,W_maxDivers,W_maxBullets,W_formSpeed,W_shooterPct,W_diveSpd;

function computeWaveParams(){
  const r=Math.min(waveRamp(wave),1.0);
  W_shootMin=Math.max(D.shootMin*(1-r*0.45),D.shootMin*0.35);
  W_shootRnd=Math.max(D.shootRnd*(1-r*0.3),D.shootRnd*0.4);
  W_bulletSpd=D.bulletSpd*(1+r*0.35);
  W_maxDivers=D.maxDivers+Math.floor(r*3);
  W_maxBullets=D.maxBullets+Math.floor(r*6);
  W_formSpeed=D.formSpeed*(1+r*0.4);
  W_shooterPct=Math.min(D.shooterPct+r*0.25,0.9);
  W_diveSpd=D.diveSpd*(1+r*0.2);
}

function setDiff(d,btn){difficulty=d;D=DIFF[d];document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

let state='start',score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={},lastShot=0;
const SHOT_COOLDOWN=280;
let frameId=null,waveClearing=false,playerHitCooldown=0;
let formDir=1,formX=0;
const FORM_RANGE=IS_RETINA?55:36;

const ENEMY_DRAWS=[
  (c,x,y,s)=>{c.lineWidth=1;c.beginPath();c.moveTo(x,y-s*.45);c.lineTo(x+s*.42,y+s*.35);c.lineTo(x-s*.42,y+s*.35);c.closePath();c.stroke();c.beginPath();c.arc(x,y,s*.12,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{c.lineWidth=1;c.beginPath();c.moveTo(x,y-s*.45);c.lineTo(x+s*.32,y);c.lineTo(x,y+s*.45);c.lineTo(x-s*.32,y);c.closePath();c.stroke();},
  (c,x,y,s)=>{c.lineWidth=.9;c.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;c[i===0?'moveTo':'lineTo'](x+Math.cos(a)*s*.4,y+Math.sin(a)*s*.4);}c.closePath();c.stroke();c.beginPath();c.arc(x,y,s*.1,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{[.4,.25,.12].forEach((r,i)=>{c.lineWidth=.9-i*.2;c.globalAlpha=.9-i*.2;c.beginPath();c.arc(x,y,s*r,0,Math.PI*2);c.stroke();});c.globalAlpha=1;},
  (c,x,y,s)=>{c.lineWidth=.9;const r=s*.38;c.beginPath();c.moveTo(x-r,y);c.lineTo(x+r,y);c.moveTo(x,y-r);c.lineTo(x,y+r);c.stroke();c.beginPath();c.arc(x,y,r*.35,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{c.lineWidth=1;c.save();c.translate(x,y);c.rotate(Math.PI/4);const r=s*.32;c.strokeRect(-r,-r,r*2,r*2);c.restore();},
];

function drawPlayer(x,y){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;const w=PLAYER_W,h=PLAYER_H;ctx.beginPath();ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);ctx.lineTo(x+w*.15,y+h*.3);ctx.lineTo(x-w*.15,y+h*.3);ctx.lineTo(x-w/2,y+h/2);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.arc(x,y-h*.05,h*.12,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}

function initGame(){
  player={x:W/2,y:H-80,speed:IS_RETINA?5:3.5,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();spawnEnemies();
}

function spawnEnemies(){
  enemies=[];
  const cols=BASE_COLS+Math.min(wave-1,5),rows=BASE_ROWS+Math.min(Math.floor((wave-1)/2),4);
  const offX=(W-(cols-1)*SPACING)/2,offY=IS_RETINA?100:70;
  const total=cols*rows;
  const shooterCount=Math.max(2,Math.floor(total*W_shooterPct));
  const shooterSet=new Set();
  while(shooterSet.size<shooterCount)shooterSet.add(Math.floor(Math.random()*total));
  let idx=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const type=r<1?5:r<2?3:r%2===0?0:1+Math.floor(r/2)%4;
    const canShoot=shooterSet.has(idx);
    enemies.push({x:offX+c*SPACING,y:offY+r*SPACING,baseX:offX+c*SPACING,baseY:offY+r*SPACING,type:type%6,hp:r===0?2:1,diving:false,diveAngle:0,shootTimer:canShoot?(W_shootMin+Math.random()*W_shootRnd+(r+c)*30):-1,canShoot:canShoot,phase:Math.random()*Math.PI*2,alive:true});
    idx++;
  }
}

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}
  formX+=W_formSpeed*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;
  const currentDivers=alive.filter(e=>e.diving).length;
  alive.forEach(e=>{
    if(!e.diving){
      e.x=e.baseX+formX;e.y=e.baseY+Math.sin(t*.001+e.phase)*3;
      if(currentDivers<W_maxDivers&&Math.random()<0.00008&&!waveClearing){e.diving=true;e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);}
      if(e.canShoot&&e.shootTimer>=0){e.shootTimer--;if(e.shootTimer<=0&&enemyBullets.length<W_maxBullets){e.shootTimer=W_shootMin+Math.random()*W_shootRnd;enemyBullets.push({x:e.x,y:e.y+ENEMY_SIZE/2,vy:W_bulletSpd});}else if(e.shootTimer<=0){e.shootTimer=W_shootMin*0.5;}}
    } else {
      e.x+=Math.cos(e.diveAngle)*W_diveSpd;e.y+=Math.sin(e.diveAngle)*W_diveSpd;
      if(e.y>H+60||e.x<-60||e.x>W+60){e.diving=false;e.x=e.baseX+formX;e.y=e.baseY;}
    }
  });
}

function updateBullets(){bullets=bullets.filter(b=>b.y>-20);bullets.forEach(b=>b.y-=IS_RETINA?14:10);enemyBullets=enemyBullets.filter(b=>b.y<H+20);enemyBullets.forEach(b=>b.y+=b.vy);}

function spawnParticles(x,y,n=8){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.04+Math.random()*.03});}}

function checkCollisions(){
  bullets.forEach(b=>{enemies.forEach(e=>{if(!e.alive)return;if(Math.abs(b.x-e.x)<ENEMY_SIZE*.5&&Math.abs(b.y-e.y)<ENEMY_SIZE*.5){b.dead=true;e.hp--;if(e.hp<=0){e.alive=false;score+=e.type===5?200:e.type>2?150:100;spawnParticles(e.x,e.y,8);sndEnemyDie();updateHUD();}else sndHit();}});});
  bullets=bullets.filter(b=>!b.dead);
  enemyBullets.forEach(b=>{if(Math.abs(b.x-player.x)<player.w*.45&&Math.abs(b.y-player.y)<player.h*.45){b.dead=true;hitPlayer();}});
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  enemies.forEach(e=>{if(!e.alive||!e.diving)return;if(Math.abs(e.x-player.x)<(player.w+ENEMY_SIZE)*.4&&Math.abs(e.y-player.y)<(player.h+ENEMY_SIZE)*.4){e.alive=false;spawnParticles(e.x,e.y,8);hitPlayer();}});
  enemies.forEach(e=>{if(e.alive&&e.y>H-player.h*2){e.alive=false;spawnParticles(e.x,e.y,5);}});
}

function hitPlayer(){if(playerHitCooldown>0)return;lives--;playerHitCooldown=120;spawnParticles(player.x,player.y,16);sndExplode();updateHUD();if(lives<=0){stopAllMusic();setTimeout(()=>showScreen('over'),400);}}

function updateParticles(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=.95;p.vy*=.95;});}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');lv.innerHTML='';
  for(let i=0;i<lives;i++){const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('width','14');svg.setAttribute('height','14');svg.setAttribute('viewBox','0 0 30 30');svg.style.opacity='.7';const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');p.setAttribute('points','15,2 28,26 16,20 14,20 2,26');p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');svg.appendChild(p);lv.appendChild(svg);}
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<(IS_RETINA?120:80);i++){const sx=Math.abs((Math.sin(i*127.1)*43758.5453)%1)*W,sy=Math.abs((Math.sin(i*311.7)*43758.5453)%1)*H;const ss=(Math.sin(i*91.3)*.5+.5)*1.5+.3;ctx.globalAlpha=(Math.sin(t*.001+i)*.3+.5)*.6;ctx.fillStyle='#fff';ctx.fillRect(sx,sy,ss,ss);}
  ctx.globalAlpha=1;
  particles.forEach(p=>{ctx.globalAlpha=p.life*.8;ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,2,2);});ctx.globalAlpha=1;
  enemies.forEach(e=>{if(!e.alive)return;const bri=e.hp>1?1:.75;ctx.save();ctx.strokeStyle=`rgba(255,255,255,${bri})`;ctx.shadowBlur=e.hp>1?8:3;ctx.shadowColor='rgba(255,255,255,0.6)';ENEMY_DRAWS[e.type](ctx,e.x,e.y,ENEMY_SIZE);ctx.restore();});
  ctx.fillStyle='#fff';ctx.shadowBlur=4;ctx.shadowColor='rgba(255,255,255,0.6)';
  bullets.forEach(b=>ctx.fillRect(b.x-BULLET_W/2,b.y-BULLET_H/2,BULLET_W,BULLET_H));
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(200,200,200,0.7)';ctx.shadowBlur=2;ctx.shadowColor='rgba(255,255,255,0.25)';
  enemyBullets.forEach(b=>ctx.fillRect(b.x-EBULLET_W/2,b.y,EBULLET_W,EBULLET_H));
  ctx.shadowBlur=0;
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/8)%2===0;
  if(!flicker){ctx.shadowBlur=12;ctx.shadowColor='rgba(255,255,255,0.5)';drawPlayer(player.x,player.y);ctx.shadowBlur=0;}
}

// ═══════════════════════════════
// ── GAME LOOP (fixed) ──
// ═══════════════════════════════
function startLoop(){
  if(frameId)cancelAnimationFrame(frameId);
  frameId=requestAnimationFrame(gameLoop);
}

function stopLoop(){
  if(frameId){cancelAnimationFrame(frameId);frameId=null;}
}

function gameLoop(t){
  if(state!=='play'){stopLoop();return;}

  const spd=player.speed*(keys['Shift']?1.6:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>SHOT_COOLDOWN){lastShot=t;bullets.push({x:player.x,y:player.y-player.h/2});sndShoot();}
  if(playerHitCooldown>0)playerHitCooldown--;

  updateEnemies(t);updateBullets();updateParticles();checkCollisions();draw(t);

  if(waveClearing){
    waveClearing=false;
    stopLoop();
    setTimeout(()=>showScreen('win'),600);
    return;
  }

  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  stopLoop();
  ['start-screen','over-screen','win-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){document.getElementById('over-screen').style.display='flex';document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;}
  else if(s==='win'){document.getElementById('win-screen').style.display='flex';document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} COMPLETE`;}
  else if(s==='play'){state='play';startLoop();}
}

function startGame(){
  ensureAudio();if(AC&&AC.state==='suspended')AC.resume();startAmbient();
  D=DIFF[difficulty];score=0;wave=1;lives=D.lives;
  formX=0;formDir=1;playerHitCooldown=0;
  updateHUD();initGame();
  fadeMenuOut().then(()=>playStageMusic(wave));
  showScreen('play');
}

function nextWave(){
  wave++;formX=0;formDir=1;
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();updateHUD();spawnEnemies();
  playStageMusic(wave);
  showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{stopAllMusic();document.getElementById('over-screen').style.display='none';document.getElementById('start-screen').style.display='flex';setTimeout(()=>fadeMenuIn(),300);};
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key]=false);

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-touchStartX;if(player&&state==='play')player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*.5));touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',()=>{if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});});

updateHUD();
</script>
