<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void & Light</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;overflow:hidden;}
  #noise{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.15;}

  /* MENU */
  #menu{position:fixed;inset:0;z-index:50;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
  #menu h1{font-size:2rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 40px rgba(255,255,255,0.2);}
  #menu p{font-size:0.6rem;letter-spacing:0.3em;opacity:0.25;}
  .menu-btns{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .menu-btn{width:280px;padding:13px 0;background:transparent;border:1px solid #2a2a2a;color:#777;font-family:'Courier New',monospace;font-size:0.72rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
  .menu-btn:hover{border-color:#888;color:#fff;box-shadow:0 0 20px rgba(255,255,255,0.05);}
  .menu-btn .sub{display:block;font-size:0.52rem;opacity:0.35;margin-top:3px;letter-spacing:0.1em;}
  #diff-select{display:flex;gap:10px;}
  .diff-btn{padding:5px 14px;background:transparent;border:1px solid #1e1e1e;color:#444;font-family:'Courier New',monospace;font-size:0.58rem;letter-spacing:0.15em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
  .diff-btn:hover{border-color:#666;color:#aaa;}
  .diff-btn.active{border-color:#888;color:#fff;}
  #diff-label{font-size:0.58rem;letter-spacing:0.2em;opacity:0.3;}

  /* GAME */
  #game{display:none;position:relative;width:100vw;height:100vh;overflow:hidden;}
  #planet-layer{position:absolute;inset:0;}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(10,10,10,0.95),transparent);}
  .hud-faction{display:flex;flex-direction:column;gap:2px;min-width:130px;}
  .hud-faction .name{font-size:0.58rem;letter-spacing:0.2em;opacity:0.5;}
  .hud-faction .score{font-size:1.1rem;font-weight:700;letter-spacing:0.1em;}
  .hud-faction .flux{font-size:0.58rem;letter-spacing:0.1em;opacity:0.5;}
  .hud-faction.void .score{color:#777;text-shadow:0 0 10px #333;}
  .hud-faction.light .score{color:#fff;text-shadow:0 0 16px #fff,0 0 30px rgba(255,255,255,0.4);}
  .hud-faction.light{text-align:right;}
  #hud-center{text-align:center;}
  #hud-round{font-size:0.58rem;letter-spacing:0.2em;opacity:0.3;}
  #hud-turn{font-size:0.72rem;letter-spacing:0.2em;opacity:0.7;margin-top:2px;}
  #hud-mode-tag{font-size:0.5rem;letter-spacing:0.15em;opacity:0.25;margin-top:2px;}

  /* Bottom bar */
  #bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:10px 20px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(10,10,10,0.95),transparent);}
  #info-bar{font-size:0.6rem;letter-spacing:0.1em;opacity:0.4;flex:1;text-align:center;}
  #actions{display:flex;gap:8px;}
  .act-btn{padding:5px 14px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:0.58rem;letter-spacing:0.15em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
  .act-btn:hover:not(:disabled){border-color:#777;color:#ccc;}
  .act-btn:disabled{opacity:0.12;cursor:default;}
  .act-btn.active{border-color:#999;color:#fff;}

  /* Planet SVG wrapper */
  .planet-wrap{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:filter 0.3s;}
  .planet-wrap:hover{filter:brightness(1.4);}
  .planet-wrap.selected{filter:brightness(1.6) drop-shadow(0 0 8px rgba(255,255,255,0.6));}
  .planet-wrap.ai-thinking .planet-svg{animation:aipulse 0.7s infinite alternate;}
  @keyframes aipulse{0%{opacity:0.6}100%{opacity:1;filter:drop-shadow(0 0 6px white);}}
  .planet-label{position:absolute;top:calc(100% + 3px);left:50%;transform:translateX(-50%);font-size:0.48rem;letter-spacing:0.1em;opacity:0.4;white-space:nowrap;pointer-events:none;}

  /* End screen */
  #end-screen{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,10,10,0.94);flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  #end-screen.show{display:flex;}
  #end-title{font-size:1.8rem;letter-spacing:0.4em;text-transform:uppercase;}
  #end-title.void-win{color:#888;text-shadow:0 0 20px #444;}
  #end-title.light-win{color:#fff;text-shadow:0 0 30px #fff,0 0 60px rgba(255,255,255,0.4);}
  #end-title.draw{color:#aaa;}
  #end-scores{font-size:0.78rem;letter-spacing:0.2em;opacity:0.45;}
  .end-btns{display:flex;gap:14px;margin-top:6px;}
  .end-btn{padding:9px 24px;background:transparent;border:1px solid #333;color:#777;font-family:'Courier New',monospace;font-size:0.68rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
  .end-btn:hover{border-color:#aaa;color:#fff;}
</style>
</head>
<body>
<canvas id="noise"></canvas>

<div id="menu">
  <h1>VOID &amp; LIGHT</h1>
  <p>TWO FORCES · ONE SPECTRUM</p>
  <div class="menu-btns">
    <button class="menu-btn" onclick="startGame('pvp')">⚫ VS ⚪ TWO PLAYERS<span class="sub">local hot-seat</span></button>
    <button class="menu-btn" onclick="startGame('pva')">⚫ VS AI<span class="sub">you play as void</span></button>
    <button class="menu-btn" onclick="startGame('avp')">AI VS ⚪<span class="sub">you play as light</span></button>
  </div>
  <div id="diff-label">AI DIFFICULTY</div>
  <div id="diff-select">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('medium',this)">MEDIUM</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
</div>

<div id="game">
  <div id="planet-layer"></div>
  <div id="hud">
    <div class="hud-faction void">
      <div class="name">⚫ VOID</div>
      <div class="score" id="void-score">0</div>
      <div class="flux">FLUX <span id="void-flux">5</span></div>
    </div>
    <div id="hud-center">
      <div id="hud-round">ROUND 1 / 10</div>
      <div id="hud-turn">VOID'S TURN</div>
      <div id="hud-mode-tag"></div>
    </div>
    <div class="hud-faction light">
      <div class="name">LIGHT ⚪</div>
      <div class="score" id="light-score">0</div>
      <div class="flux">FLUX <span id="light-flux">5</span></div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="actions">
      <button class="act-btn active" id="btn-claim" onclick="setMode('claim')">CLAIM</button>
      <button class="act-btn" id="btn-reinforce" onclick="setMode('reinforce')">REINFORCE</button>
      <button class="act-btn" id="btn-endturn" onclick="endTurn()">END TURN</button>
      <button class="act-btn" onclick="backToMenu()">MENU</button>
    </div>
    <div id="info-bar">Select a planet.</div>
  </div>
</div>

<div id="end-screen">
  <div id="end-title"></div>
  <div id="end-scores"></div>
  <div class="end-btns">
    <button class="end-btn" onclick="startGame(gameMode)">REMATCH</button>
    <button class="end-btn" onclick="backToMenu()">MENU</button>
  </div>
</div>

<script>
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function resizeNoise(){nc.width=innerWidth;nc.height=innerHeight;}
resizeNoise();window.addEventListener('resize',()=>{resizeNoise();if(planets)layoutPlanets();});
function drawNoise(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(drawNoise,80);

const DESIGNS=[
  i=>`<circle cx="40" cy="40" r="30" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.8"/><circle cx="40" cy="40" r="22" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6"/><circle cx="40" cy="40" r="14" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.5"/><circle cx="40" cy="40" r="6" fill="currentColor" opacity="0.7"/>`,
  i=>`<ellipse cx="40" cy="40" rx="38" ry="10" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.4"/><circle cx="40" cy="40" r="20" fill="currentColor" opacity="0.85"/><circle cx="68" cy="40" r="3" fill="currentColor" opacity="0.7"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1" opacity="0.7"/>${Array.from({length:7},(_,k)=>`<line x1="${12+k*9}" y1="12" x2="${12+k*9}" y2="68" stroke="currentColor" stroke-width="0.5" opacity="0.35"/>`).join('')}<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>`,
  i=>`<circle cx="40" cy="40" r="30" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/><polygon points="40,14 64,58 16,58" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.8"/><circle cx="40" cy="40" r="4" fill="currentColor" opacity="0.7"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>${Array.from({length:8},(_,k)=>{const a=k/8*Math.PI*2,r=8+k*2.8,x=40+Math.cos(a)*r,y=40+Math.sin(a)*r;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${1.2+k*0.3}" fill="currentColor" opacity="${0.4+k*0.07}"/>`;}).join('')}`,
  i=>`<circle cx="40" cy="40" r="26" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/><line x1="40" y1="10" x2="40" y2="70" stroke="currentColor" stroke-width="0.7" opacity="0.5"/><line x1="10" y1="40" x2="70" y2="40" stroke="currentColor" stroke-width="0.7" opacity="0.5"/><line x1="18" y1="18" x2="62" y2="62" stroke="currentColor" stroke-width="0.5" opacity="0.3"/><line x1="62" y1="18" x2="18" y2="62" stroke="currentColor" stroke-width="0.5" opacity="0.3"/><circle cx="40" cy="40" r="6" fill="currentColor" opacity="0.8"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/><path d="M40,12 A28,28 0 0,1 40,68 Z" fill="currentColor" opacity="0.75"/><circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>`,
  i=>`<polygon points="40,10 66,25 66,55 40,70 14,55 14,25" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/><polygon points="40,20 56,29 56,51 40,60 24,51 24,29" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.4"/><circle cx="40" cy="40" r="5" fill="currentColor" opacity="0.7"/>`,
  i=>`<ellipse cx="40" cy="40" rx="36" ry="9" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35"/><ellipse cx="40" cy="40" rx="28" ry="7" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.25"/><circle cx="40" cy="40" r="18" fill="currentColor" opacity="0.8"/>`,
  i=>`<rect x="14" y="14" width="52" height="52" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" transform="rotate(0 40 40)"/><rect x="22" y="22" width="36" height="36" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.4" transform="rotate(15 40 40)"/><rect x="30" y="30" width="20" height="20" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.35" transform="rotate(30 40 40)"/><circle cx="40" cy="40" r="4" fill="currentColor" opacity="0.7"/>`,
  i=>`${Array.from({length:5},(_,k)=>`<path d="M${14+k*4},40 Q40,${14+k*4} ${66-k*4},40" fill="none" stroke="currentColor" stroke-width="${1-k*0.1}" opacity="${0.7-k*0.1}"/>`).join('')}<circle cx="40" cy="40" r="5" fill="currentColor" opacity="0.7"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>${[[20,20],[55,18],[65,45],[50,62],[25,58],[15,38]].map(([x,y],k)=>`<circle cx="${x}" cy="${y}" r="2" fill="currentColor" opacity="0.7"/>`).join('')}`,
  i=>`<circle cx="40" cy="40" r="26" fill="currentColor" opacity="0.8"/><circle cx="50" cy="36" r="22" fill="#0a0a0a"/><circle cx="40" cy="40" r="26" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>`,
  i=>`<circle cx="40" cy="40" r="30" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.4"/><circle cx="40" cy="40" r="22" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/><circle cx="40" cy="40" r="14" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.75"/><circle cx="40" cy="40" r="5" fill="currentColor" opacity="0.9"/><line x1="10" y1="40" x2="70" y2="40" stroke="currentColor" stroke-width="0.5" opacity="0.25"/><line x1="40" y1="10" x2="40" y2="70" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>`,
  i=>`<polygon points="40,8 68,40 40,72 12,40" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/><polygon points="40,18 60,40 40,62 20,40" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.45"/><circle cx="40" cy="40" r="5" fill="currentColor" opacity="0.75"/>`,
  i=>`${Array.from({length:12},(_,k)=>{const a=k/12*Math.PI*2,x1=40+Math.cos(a)*16,y1=40+Math.sin(a)*16,x2=40+Math.cos(a)*28,y2=40+Math.sin(a)*28;return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>`;}).join('')}<circle cx="40" cy="40" r="14" fill="currentColor" opacity="0.8"/>`,
  i=>`<circle cx="40" cy="40" r="26" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.3"/><circle cx="40" cy="40" r="10" fill="currentColor" opacity="0.8"/><circle cx="66" cy="40" r="4" fill="currentColor" opacity="0.6"/><circle cx="14" cy="40" r="4" fill="currentColor" opacity="0.6"/>`,
  i=>`<path d="M40,40 m-20,0 a20,20 0 0,1 20,-20" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/><path d="M40,20 a30,30 0 0,1 30,30" fill="none" stroke="currentColor" stroke-width="1" opacity="0.55"/><path d="M70,50 a18,18 0 0,1 -18,18" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.4"/><circle cx="40" cy="40" r="3" fill="currentColor" opacity="0.8"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>${[-14,-7,0,7,14].map(o=>`<line x1="${40+o}" y1="12" x2="${40+o}" y2="68" stroke="currentColor" stroke-width="0.4" opacity="0.25"/><line x1="12" y1="${40+o}" x2="68" y2="${40+o}" stroke="currentColor" stroke-width="0.4" opacity="0.25"/>`).join('')}<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>`,
  i=>`<circle cx="40" cy="40" r="8" fill="currentColor" opacity="0.85"/><line x1="10" y1="40" x2="70" y2="40" stroke="currentColor" stroke-width="0.8" opacity="0.4"/><circle cx="10" cy="40" r="2.5" fill="currentColor" opacity="0.55"/><circle cx="70" cy="40" r="1.5" fill="currentColor" opacity="0.4"/>`,
  i=>`<path d="M10,40 Q40,10 70,40 Q40,70 10,40 Z" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/><circle cx="40" cy="40" r="12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/><circle cx="40" cy="40" r="5" fill="currentColor" opacity="0.8"/>`,
  i=>`<ellipse cx="40" cy="40" rx="28" ry="14" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/><ellipse cx="40" cy="40" rx="28" ry="14" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3" transform="rotate(60 40 40)"/><ellipse cx="40" cy="40" rx="28" ry="14" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3" transform="rotate(120 40 40)"/><circle cx="40" cy="40" r="4" fill="currentColor" opacity="0.7"/>`,
  i=>`<circle cx="55" cy="35" r="12" fill="currentColor" opacity="0.85"/><path d="M44,40 Q30,50 10,60" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.3" fill="none"/><path d="M46,37 Q32,44 14,50" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.2" fill="none"/>`,
  i=>`<circle cx="40" cy="40" r="28" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.4"/><polygon points="40,13 47,34 70,34 52,48 58,69 40,56 22,69 28,48 10,34 33,34" fill="none" stroke="currentColor" stroke-width="1" opacity="0.7"/>`,
];

let planets,positions,turn,round,voidFlux,lightFlux,mode,gameMode,aiDiff='easy',aiLock=false;
const N_PLANETS=20,MAX_ROUNDS=10,PLANET_SIZE=72;

function setDiff(d,btn){aiDiff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function backToMenu(){document.getElementById('end-screen').classList.remove('show');document.getElementById('game').style.display='none';document.getElementById('menu').style.display='flex';}

function startGame(m){
  gameMode=m;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('end-screen').classList.remove('show');
  const tags={pvp:'TWO PLAYERS · HOT-SEAT',pva:'YOU ⚫ VOID · VS AI LIGHT',avp:'AI VOID · VS YOU ⚪ LIGHT'};
  document.getElementById('hud-mode-tag').textContent=tags[m];
  initGame();
}

function generatePositions(){
  const W=innerWidth,H=innerHeight,pad=60,minDist=90,pts=[];
  let attempts=0;
  while(pts.length<N_PLANETS&&attempts<3000){
    attempts++;
    const x=pad+Math.random()*(W-pad*2),y=70+Math.random()*(H-140);
    if(pts.every(p=>Math.hypot(p.x-x,p.y-y)>minDist))pts.push({x,y});
  }
  return pts;
}

function initGame(){
  const shuffled=[...Array(DESIGNS.length).keys()].sort(()=>Math.random()-0.5);
  planets=[];
  for(let i=0;i<N_PLANETS;i++) planets.push({owner:'neutral',strength:Math.floor(Math.random()*3)+1,fluxVal:Math.floor(Math.random()*2)+1,design:shuffled[i%DESIGNS.length]});
  [0,1,2].forEach(i=>{planets[i].owner='void';planets[i].strength=2;});
  [N_PLANETS-1,N_PLANETS-2,N_PLANETS-3].forEach(i=>{planets[i].owner='light';planets[i].strength=2;});
  turn='void';round=1;voidFlux=5;lightFlux=5;mode='claim';aiLock=false;
  positions=generatePositions();
  setMode('claim');renderAll();maybeAI();
}

function layoutPlanets(){positions=generatePositions();renderAll();}
function getFlux(p){return p==='void'?voidFlux:lightFlux;}
function addFlux(p,v){if(p==='void')voidFlux+=v;else lightFlux+=v;}
function countPlanets(p){return planets.filter(x=>x.owner===p).length;}
function isAITurn(){return (gameMode==='pva'&&turn==='light')||(gameMode==='avp'&&turn==='void');}
function setMode(m){mode=m;document.getElementById('btn-claim').classList.toggle('active',m==='claim');document.getElementById('btn-reinforce').classList.toggle('active',m==='reinforce');}
function setInfo(msg){document.getElementById('info-bar').textContent=msg;}

function cellClick(i){if(aiLock||isAITurn())return;doAction(i);}

function doAction(i){
  const pl=planets[i],flux=getFlux(turn);
  if(mode==='reinforce'){
    if(pl.owner!==turn){setInfo('Reinforce your own planets only.');return;}
    if(flux<2){setInfo('Need 2 flux to reinforce.');return;}
    pl.strength++;addFlux(turn,-2);setInfo(`Reinforced to strength ${pl.strength}.`);
  }else{
    const cost=pl.strength+1;
    if(pl.owner===turn){setInfo('Already yours.');return;}
    if(flux<cost){setInfo(`Need ${cost} flux (have ${flux}).`);return;}
    addFlux(turn,-cost);
    if(pl.owner==='neutral'){pl.owner=turn;setInfo('Planet claimed!');}
    else{const atk=Math.random()*3+flux*0.25,def=Math.random()*3+pl.strength*1.2;if(atk>def){pl.owner=turn;pl.strength=1;setInfo('Attack succeeded!');}else{pl.strength=Math.min(pl.strength+1,6);setInfo('Attack repelled.');}}
  }
  renderAll();
}

function endTurn(){
  if(aiLock)return;
  let gained=0;planets.forEach(p=>{if(p.owner===turn)gained+=p.fluxVal;});
  addFlux(turn,gained);
  turn=turn==='void'?'light':'void';
  if(turn==='void'){round++;if(round>MAX_ROUNDS){endGame();return;}}
  mode='claim';setMode('claim');renderAll();maybeAI();
}

function maybeAI(){
  if(!isAITurn())return;
  aiLock=true;setInfo('AI is thinking…');
  setTimeout(runAI,aiDiff==='easy'?900:aiDiff==='medium'?600:350);
}

function scoreTarget(i,pl,ai){
  if(pl.owner===ai)return -999;
  let s=pl.owner==='neutral'?pl.fluxVal*3-pl.strength:pl.fluxVal*4-pl.strength;
  if(aiDiff!=='easy')s+=countAdj(i,ai)*2;
  if(aiDiff==='hard'&&isEdge(i))s+=2;
  return s;
}
function countAdj(i,owner){return planets.filter((_,j)=>j!==i&&Math.hypot(positions[i].x-positions[j].x,positions[i].y-positions[j].y)<150&&planets[j].owner===owner).length;}
function isEdge(i){return positions[i].x<120||positions[i].x>innerWidth-120||positions[i].y<120||positions[i].y>innerHeight-120;}

function runAI(){
  const ai=turn,flux=getFlux(ai);
  const targets=planets.map((p,i)=>({p,i,s:scoreTarget(i,p,ai)})).filter(({p})=>p.owner!==ai&&getFlux(ai)>=p.strength+1).sort((a,b)=>b.s-a.s);
  if(aiDiff==='hard'&&flux>=2&&Math.random()>0.5){
    const mine=planets.map((p,i)=>({p,i})).filter(({p})=>p.owner===ai).sort((a,b)=>b.p.fluxVal-a.p.fluxVal);
    if(mine.length){mode='reinforce';doAction(mine[0].i);}
  }
  if(targets.length){
    mode='claim';
    const pick=aiDiff==='easy'?targets[Math.floor(Math.random()*Math.min(3,targets.length))]:targets[0];
    doAction(pick.i);
    if(aiDiff!=='easy'&&getFlux(ai)>=4){
      const t2=planets.map((p,i)=>({p,i,s:scoreTarget(i,p,ai)})).filter(({p})=>p.owner!==ai&&getFlux(ai)>=p.strength+1).sort((a,b)=>b.s-a.s);
      if(t2.length&&Math.random()>0.4){setTimeout(()=>{mode='claim';doAction(t2[0].i);setTimeout(()=>{aiLock=false;endTurn();},300);},400);return;}
    }
  }
  setTimeout(()=>{aiLock=false;endTurn();},400);
}

function endGame(){
  const vs=countPlanets('void'),ls=countPlanets('light'),vT=vs*10+voidFlux,lT=ls*10+lightFlux;
  document.getElementById('end-screen').classList.add('show');
  const title=document.getElementById('end-title');
  if(vT>lT){title.textContent='VOID PREVAILS';title.className='void-win';}
  else if(lT>vT){title.textContent='LIGHT TRIUMPHS';title.className='light-win';}
  else{title.textContent='EQUILIBRIUM';title.className='draw';}
  document.getElementById('end-scores').textContent=`VOID ${vs} planets · ${voidFlux} flux   |   LIGHT ${ls} planets · ${lightFlux} flux`;
}

function ownerColor(owner){return owner==='void'?'#666':owner==='light'?'#fff':'#555';}
function ownerGlow(owner){
  if(owner==='light')return 'drop-shadow(0 0 8px rgba(255,255,255,0.9)) drop-shadow(0 0 20px rgba(255,255,255,0.5))';
  if(owner==='void')return 'drop-shadow(0 0 6px rgba(80,80,80,0.8))';
  return 'drop-shadow(0 0 4px rgba(100,100,100,0.4))';
}

function renderAll(){
  document.getElementById('void-score').textContent=countPlanets('void');
  document.getElementById('light-score').textContent=countPlanets('light');
  document.getElementById('void-flux').textContent=voidFlux;
  document.getElementById('light-flux').textContent=lightFlux;
  document.getElementById('hud-round').textContent=`ROUND ${round} / ${MAX_ROUNDS}`;
  document.getElementById('hud-turn').textContent=`${turn.toUpperCase()}'S TURN${isAITurn()?' · AI':''}`;
  ['btn-claim','btn-reinforce','btn-endturn'].forEach(id=>document.getElementById(id).disabled=aiLock||isAITurn());
  const layer=document.getElementById('planet-layer');
  layer.innerHTML='';
  planets.forEach((pl,i)=>{
    const pos=positions[i],wrap=document.createElement('div');
    wrap.className='planet-wrap'+(aiLock&&isAITurn()?' ai-thinking':'');
    wrap.style.left=pos.x+'px';wrap.style.top=pos.y+'px';
    wrap.style.width=PLANET_SIZE+'px';wrap.style.height=PLANET_SIZE+'px';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.classList.add('planet-svg');
    svg.setAttribute('viewBox','0 0 80 80');svg.setAttribute('width',PLANET_SIZE);svg.setAttribute('height',PLANET_SIZE);
    svg.style.color=ownerColor(pl.owner);svg.style.filter=ownerGlow(pl.owner);
    svg.innerHTML=DESIGNS[pl.design](i);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x','40');txt.setAttribute('y','44');txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','10');txt.setAttribute('font-family','Courier New');
    txt.setAttribute('fill',ownerColor(pl.owner));txt.setAttribute('opacity','0.9');txt.textContent=pl.strength;
    svg.appendChild(txt);wrap.appendChild(svg);
    const lbl=document.createElement('div');lbl.className='planet-label';lbl.textContent=`+${pl.fluxVal}`;
    wrap.appendChild(lbl);wrap.onclick=()=>cellClick(i);layer.appendChild(wrap);
  });
}
</script>
