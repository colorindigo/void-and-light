<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA · NEON</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#back-btn{position:fixed;top:18px;left:22px;z-index:200;background:transparent;border:none;color:#552200;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.3s;}
#back-btn:hover{color:#ff6600;}
#canvas{display:block;position:fixed;inset:0;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:16px 26px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.hud-val{font-size:0.7rem;letter-spacing:0.22em;color:#552200;}
.hud-val span{color:#ff4400;opacity:1;font-size:1rem;display:block;margin-top:2px;text-shadow:0 0 12px #ff4400,0 0 30px #ff220088;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#000;}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ff4400;font-weight:200;text-shadow:0 0 20px #ff4400,0 0 60px #ff220066,0 0 100px #ff110033;}
.screen p{font-size:0.62rem;letter-spacing:0.2em;color:#552200;text-align:center;line-height:2.2;}
.screen-btn{padding:11px 34px;background:transparent;border:1px solid #552200;color:#883300;font-family:'Courier New',monospace;font-size:0.72rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.3s;}
.screen-btn:hover{border-color:#ff4400;color:#ff4400;box-shadow:0 0 20px #ff220033,inset 0 0 20px #ff110011;}
.diff-row{display:flex;gap:12px;}
.diff-btn{padding:8px 20px;background:transparent;border:1px solid #331100;color:#441100;font-family:'Courier New',monospace;font-size:0.65rem;letter-spacing:0.18em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.diff-btn:hover{border-color:#ff4400;color:#ff4400;}
.diff-btn.active{border-color:#ff4400;color:#ff4400;box-shadow:0 0 14px #ff220033;}
.diff-label{font-size:0.55rem;letter-spacing:0.22em;color:#331100;}
.lives{display:flex;gap:8px;align-items:center;}
.life-pip{width:8px;height:8px;border-radius:50%;background:#ff4400;box-shadow:0 0 8px #ff4400,0 0 16px #ff220088;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .screen h1{font-size:2.4rem;}
  .screen p{font-size:0.78rem;}
  .screen-btn{font-size:0.88rem;}
  .diff-btn{font-size:0.8rem;padding:9px 24px;}
  .hud-val{font-size:0.86rem;}
  .hud-val span{font-size:1.2rem;}
  #back-btn{font-size:0.78rem;}
}
</style>
</head>
<body>
<button id="back-btn" onclick="window.location.href='../../neon/'">&#8592; NEON GAMES</button>
<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES
    <div class="lives" id="lives-val"></div>
  </div>
</div>

<div class="screen" id="start-screen">
  <h1>GALAGA</h1>
  <p>A/D or ARROWS &mdash; MOVE<br>SPACE &mdash; FIRE</p>
  <div class="diff-label">DIFFICULTY</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('normal',this)">NORMAL</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../../neon/'">MENU</button>
</div>

<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);

const IS_RETINA=window.devicePixelRatio>=2;
const R=IS_RETINA?2:1;
const PLAYER_W=30*R,PLAYER_H=24*R;
const BULLET_W=2*R,BULLET_H=14*R;
const ES=IS_RETINA?38:26;

// Orange palette
const C={
  primary:'#ff4400',
  bright:'#ff7700',
  dim:'#ff220044',
  player:'#ff6600',
  enemy0:'#ff4400',
  enemy1:'#ff6600',
  bullet:'#ffaa00',
  ebullet:'#ff2200',
  bg:'#000000',
};

const DIFF={
  easy:{shootMin:300,shootRnd:400,bulletSpd:1.6*R,diveChance:0.00012,descentPx:28,formSpeed:0.28,waveShootBonus:20,waveBulletBonus:0.08,lives:5},
  normal:{shootMin:180,shootRnd:220,bulletSpd:2.2*R,diveChance:0.00022,descentPx:36,formSpeed:0.35,waveShootBonus:12,waveBulletBonus:0.12,lives:3},
  hard:{shootMin:90,shootRnd:110,bulletSpd:3.2*R,diveChance:0.00042,descentPx:48,formSpeed:0.44,waveShootBonus:6,waveBulletBonus:0.18,lives:2},
};
let difficulty='easy',D=DIFF[difficulty];
let waveShootMin,waveBulletSpd,waveDiveChance,waveFormSpeed;

function computeWaveParams(){
  const wb=wave-1;
  waveShootMin=Math.max(D.shootMin-wb*D.waveShootBonus,Math.floor(D.shootMin*0.4));
  waveBulletSpd=Math.min(D.bulletSpd+wb*D.waveBulletBonus,D.bulletSpd+0.6);
  waveDiveChance=Math.min(D.diveChance*(1+wb*0.15),D.diveChance*2.5);
  waveFormSpeed=Math.min(D.formSpeed*(1+wb*0.08),D.formSpeed*1.6);
}
function setDiff(d,btn){
  difficulty=d;D=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

let state='start',score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={},lastShot=0;
const SHOT_COOLDOWN=280;
let frameId,waveClearing=false;
let playerHitCooldown=0;
let formDir=1,formX=0,formDescentOffset=0;
const FORM_RANGE=IS_RETINA?60:40;
const DESCENT_FRAMES=480;
let descentFrame=0;

// ── Bloom helper ──
function glow(c,color,blur){
  c.shadowBlur=blur;
  c.shadowColor=color;
}
function clearGlow(c){c.shadowBlur=0;}

// ── Enemy draws — same geometry, now with bloom ──
const ENEMY_DRAWS=[
  (c,x,y,s,col)=>{ // triangle
    c.lineWidth=1.4;c.beginPath();
    c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.42,y+s*0.35);c.lineTo(x-s*0.42,y+s*0.35);
    c.closePath();c.stroke();
    c.beginPath();c.arc(x,y,s*0.1,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  (c,x,y,s,col)=>{ // diamond
    c.lineWidth=1.4;c.beginPath();
    c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.32,y);c.lineTo(x,y+s*0.45);c.lineTo(x-s*0.32,y);
    c.closePath();c.stroke();
  },
  (c,x,y,s,col)=>{ // hexagon
    c.lineWidth=1;c.beginPath();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;c[i===0?'moveTo':'lineTo'](x+Math.cos(a)*s*0.4,y+Math.sin(a)*s*0.4);}
    c.closePath();c.stroke();
    c.beginPath();c.arc(x,y,s*0.1,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  (c,x,y,s,col)=>{ // rings
    [0.4,0.26,0.13].forEach((r,i)=>{
      c.lineWidth=1-i*0.2;c.globalAlpha=0.9-i*0.2;
      c.beginPath();c.arc(x,y,s*r,0,Math.PI*2);c.stroke();
    });c.globalAlpha=1;
  },
  (c,x,y,s,col)=>{ // cross
    c.lineWidth=1.2;const r=s*0.38;
    c.beginPath();c.moveTo(x-r,y);c.lineTo(x+r,y);c.moveTo(x,y-r);c.lineTo(x,y+r);c.stroke();
    c.beginPath();c.arc(x,y,r*0.3,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  (c,x,y,s,col)=>{ // square
    c.lineWidth=1.4;c.save();c.translate(x,y);c.rotate(Math.PI/4);
    const r=s*0.32;c.strokeRect(-r,-r,r*2,r*2);c.restore();
  },
];

// ── Bloom layers: draw same shape twice — wider blur first, then sharp ──
function drawEnemyBloomed(c,x,y,s,type,hp){
  const col=hp>1?C.bright:C.primary;
  const bloomCol=hp>1?'#ff770088':'#ff440066';
  // bloom pass
  c.save();
  c.strokeStyle=bloomCol;c.fillStyle=bloomCol;
  glow(c,col,hp>1?28:16);
  ENEMY_DRAWS[type](c,x,y,s*1.08,bloomCol);
  c.restore();
  // sharp pass
  c.save();
  c.strokeStyle=col;c.fillStyle=col;
  glow(c,col,8);
  ENEMY_DRAWS[type](c,x,y,s,col);
  c.restore();
}

function drawPlayer(x,y,t){
  const w=PLAYER_W,h=PLAYER_H;
  // engine glow
  const pulse=0.7+Math.sin(t*0.12)*0.3;
  ctx.save();
  ctx.fillStyle=`rgba(255,100,0,${0.18*pulse})`;
  ctx.shadowBlur=IS_RETINA?50:32;
  ctx.shadowColor='#ff4400';
  ctx.beginPath();ctx.ellipse(x,y+h*0.45,w*0.22,h*0.12,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // ship bloom
  ctx.save();
  ctx.strokeStyle='#ff440055';
  ctx.lineWidth=4*R;
  glow(ctx,'#ff4400',IS_RETINA?40:24);
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w*0.15,y+h*0.3);ctx.lineTo(x-w*0.15,y+h*0.3);ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath();ctx.stroke();
  ctx.restore();
  // ship sharp
  ctx.save();
  ctx.strokeStyle=C.player;
  ctx.lineWidth=1.5*R;
  glow(ctx,C.player,IS_RETINA?14:8);
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w*0.15,y+h*0.3);ctx.lineTo(x-w*0.15,y+h*0.3);ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-h*0.05,h*0.12,0,Math.PI*2);
  ctx.fillStyle=C.bright;ctx.fill();
  ctx.restore();
}

function initGame(){
  player={x:W/2,y:H-80,speed:IS_RETINA?5:3.5,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];
  waveClearing=false;
  computeWaveParams();spawnEnemies();
}

function spawnEnemies(){
  enemies=[];formDescentOffset=0;descentFrame=0;
  const cols=8+Math.min(wave-1,4);
  const rows=3+Math.min(Math.floor((wave-1)/2),3);
  const spacing=IS_RETINA?70:48;
  const offX=(W-(cols-1)*spacing)/2;
  const offY=IS_RETINA?110:80;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const type=r<1?5:r<2?3:r%2===0?0:1+Math.floor(r/2)%4;
      enemies.push({
        x:offX+c*spacing,y:offY+r*spacing,
        baseX:offX+c*spacing,baseY:offY+r*spacing,
        type:type%6,hp:r===0?2:1,
        diving:false,diveAngle:0,diveSpeed:0,
        shootTimer:waveShootMin+Math.random()*D.shootRnd+(r+c)*18,
        phase:Math.random()*Math.PI*2,alive:true
      });
    }
  }
}

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}
  formX+=waveFormSpeed*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;
  if(descentFrame<DESCENT_FRAMES){descentFrame++;formDescentOffset=(descentFrame/DESCENT_FRAMES)*D.descentPx;}
  alive.forEach(e=>{
    if(!e.diving){
      e.x=e.baseX+formX;
      e.y=e.baseY+formDescentOffset+Math.sin(t*0.001+e.phase)*4;
      if(Math.random()<waveDiveChance&&!waveClearing){
        e.diving=true;
        e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);
        e.diveSpeed=IS_RETINA?3.5:2.5;
      }
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=waveShootMin+Math.random()*D.shootRnd;
        enemyBullets.push({x:e.x,y:e.y+ES/2,vy:waveBulletSpd});
      }
    } else {
      e.x+=Math.cos(e.diveAngle)*e.diveSpeed;
      e.y+=Math.sin(e.diveAngle)*e.diveSpeed;
      e.diveSpeed+=0.05;
      if(e.y>H+60||e.x<-60||e.x>W+60){
        e.diving=false;e.x=e.baseX+formX;e.y=e.baseY+formDescentOffset;
        e.diveSpeed=IS_RETINA?3.5:2.5;
      }
    }
  });
}

function updateBullets(){
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=IS_RETINA?14:10);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  enemyBullets.forEach(b=>b.y+=b.vy);
}

function spawnParticles(x,y,n=10,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.032+Math.random()*0.028,col:col||C.primary});
  }
}

function checkCollisions(){
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(b.x-e.x)<ES*0.45&&Math.abs(b.y-e.y)<ES*0.45){
        b.dead=true;e.hp--;
        if(e.hp<=0){
          e.alive=false;
          score+=e.type===5?200:e.type>2?150:100;
          spawnParticles(e.x,e.y,14,C.bright);
          updateHUD();
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);
  enemyBullets.forEach(b=>{
    if(Math.abs(b.x-player.x)<player.w*0.45&&Math.abs(b.y-player.y)<player.h*0.45){b.dead=true;hitPlayer();}
  });
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    if(Math.abs(e.x-player.x)<(player.w+ES)*0.4&&Math.abs(e.y-player.y)<(player.h+ES)*0.4){
      e.alive=false;spawnParticles(e.x,e.y,12,C.primary);hitPlayer();
    }
  });
  enemies.forEach(e=>{if(e.alive&&e.y>H-player.h*2){e.alive=false;spawnParticles(e.x,e.y,8,C.primary);}});
}

let playerHitCooldown2=0;
function hitPlayer(){
  if(playerHitCooldown>0)return;
  lives--;playerHitCooldown=120;
  spawnParticles(player.x,player.y,20,C.player);
  updateHUD();
  if(lives<=0)setTimeout(()=>showScreen('over'),500);
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.94;p.vy*=0.94;});
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');lv.innerHTML='';
  for(let i=0;i<lives;i++){
    const d=document.createElement('div');d.className='life-pip';lv.appendChild(d);
  }
}

// ── Persistent glow layer (drawn once, fades) ──
// We use a semi-transparent black fill each frame instead of clearRect
// to create motion blur / trail effect like Akari
let glowCanvas,glowCtx;
function initGlowCanvas(){
  glowCanvas=document.createElement('canvas');
  glowCanvas.width=W;glowCanvas.height=H;
  glowCtx=glowCanvas.getContext('2d');
}
function resizeGlowCanvas(){glowCanvas.width=W;glowCanvas.height=H;}

function draw(t){
  // Semi-transparent fade — creates bloom trail (Akari effect)
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,W,H);

  // Ambient background glow — very subtle orange fog at bottom
  const grad=ctx.createRadialGradient(W/2,H,0,W/2,H,W*0.7);
  grad.addColorStop(0,'rgba(80,20,0,0.06)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Particles
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life*0.9;
    ctx.fillStyle=p.col;
    glow(ctx,p.col,IS_RETINA?16:10);
    const sz=IS_RETINA?3:2;
    ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    drawEnemyBloomed(ctx,e.x,e.y,ES,e.type,e.hp);
  });

  // Player bullets — bright core + bloom trail
  bullets.forEach(b=>{
    // bloom
    ctx.save();
    ctx.fillStyle='#ff880044';
    glow(ctx,C.bullet,IS_RETINA?22:14);
    ctx.fillRect(b.x-BULLET_W*1.5,b.y-BULLET_H*0.5,BULLET_W*3,BULLET_H*1.4);
    ctx.restore();
    // core
    ctx.save();
    ctx.fillStyle=C.bullet;
    glow(ctx,C.bullet,IS_RETINA?10:6);
    ctx.fillRect(b.x-BULLET_W/2,b.y-BULLET_H/2,BULLET_W,BULLET_H);
    ctx.restore();
  });

  // Enemy bullets
  enemyBullets.forEach(b=>{
    ctx.save();
    ctx.fillStyle='#ff110044';
    glow(ctx,C.ebullet,IS_RETINA?16:10);
    ctx.fillRect(b.x-BULLET_W,b.y,BULLET_W*2,BULLET_H);
    ctx.restore();
    ctx.save();
    ctx.fillStyle=C.ebullet;
    glow(ctx,C.ebullet,IS_RETINA?8:5);
    ctx.fillRect(b.x-BULLET_W/2,b.y,BULLET_W,BULLET_H*0.8);
    ctx.restore();
  });

  // Player
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/7)%2===0;
  if(!flicker)drawPlayer(player.x,player.y,t);
}

function gameLoop(t){
  if(state!=='play'){frameId=null;return;}
  const spd=player.speed*(keys['Shift']?1.7:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>SHOT_COOLDOWN){
    lastShot=t;bullets.push({x:player.x,y:player.y-player.h/2});
  }
  if(playerHitCooldown>0)playerHitCooldown--;
  updateEnemies(t);updateBullets();updateParticles();checkCollisions();draw(t);
  if(waveClearing){waveClearing=false;setTimeout(()=>showScreen('win'),700);return;}
  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  ['start-screen','over-screen','win-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){document.getElementById('over-screen').style.display='flex';document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;}
  else if(s==='win'){document.getElementById('win-screen').style.display='flex';document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} CLEAR`;}
  else if(s==='play'){state='play';if(!frameId)frameId=requestAnimationFrame(gameLoop);}
}

function startGame(){
  D=DIFF[difficulty];score=0;wave=1;lives=D.lives;
  formX=0;formDir=1;descentFrame=0;formDescentOffset=0;playerHitCooldown=0;
  // Clear canvas black
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  updateHUD();initGame();showScreen('play');
}
function nextWave(){
  wave++;formX=0;formDir=1;descentFrame=0;formDescentOffset=0;
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();updateHUD();spawnEnemies();showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{document.getElementById('over-screen').style.display='none';document.getElementById('start-screen').style.display='flex';};
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key]=false);

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(player&&state==='play')player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',()=>{if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});});

updateHUD();
</script>
</body>
</html>
