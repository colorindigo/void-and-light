<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA MONO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0.13;}
#back-btn{position:fixed;top:16px;left:20px;z-index:200;background:transparent;border:none;color:#333;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.2s;}
#back-btn:hover{color:#aaa;}
#canvas{display:block;position:fixed;inset:0;}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);}
.hud-val{font-size:0.72rem;letter-spacing:0.2em;opacity:0.6;}
.hud-val span{color:#fff;opacity:1;font-size:1rem;display:block;margin-top:2px;}
/* Screens */
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(10,10,10,0.92);}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.screen p{font-size:0.65rem;letter-spacing:0.2em;opacity:0.3;text-align:center;line-height:2;}
.screen-btn{padding:11px 32px;background:transparent;border:1px solid #333;color:#888;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.screen-btn:hover{border-color:#aaa;color:#fff;}
.lives{display:flex;gap:10px;}
.life-icon{width:14px;height:14px;opacity:0.7;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .hud-val{font-size:0.88rem;}
  .hud-val span{font-size:1.2rem;}
  .screen h1{font-size:2.4rem;}
  .screen p{font-size:0.8rem;}
  .screen-btn{font-size:0.9rem;}
  #back-btn{font-size:0.8rem;}
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<button id="back-btn" onclick="window.location.href='../'">&#8592; MONO GAMES</button>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES
    <div class="lives" id="lives-val"></div>
  </div>
</div>

<div class="screen" id="start-screen">
  <h1>GALAGA MONO</h1>
  <p>ARROW KEYS or A/D &mdash; MOVE<br>SPACE &mdash; FIRE<br>SURVIVE THE FORMATION</p>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../'">MENU</button>
</div>

<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
// ── Noise ──
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function rn(){nc.width=innerWidth;nc.height=innerHeight;}
rn();window.addEventListener('resize',()=>{rn();resize();});
function dn(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(dn,80);

// ── Canvas ──
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();

// ── Game state ──
const IS_RETINA=window.devicePixelRatio>=2;
const PLAYER_W=IS_RETINA?44:30;
const PLAYER_H=IS_RETINA?36:24;
const BULLET_W=IS_RETINA?3:2;
const BULLET_H=IS_RETINA?18:12;
const ENEMY_SIZE=IS_RETINA?38:26;
const FONT_SM=IS_RETINA?'13px':' 9px';

let state='start'; // start|play|over|win
let score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={};
let lastShot=0,shotCooldown=320;
let frameId;
let waveClearing=false;

// ── Enemy designs (SVG paths drawn on canvas) ──
// Each is a function(ctx, cx, cy, size, color)
const ENEMY_DRAWS=[
  // Type 0: triangle
  (c,x,y,s,col)=>{
    c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();
    c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.42,y+s*0.35);c.lineTo(x-s*0.42,y+s*0.35);c.closePath();c.stroke();
    c.beginPath();c.arc(x,y,s*0.12,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  // Type 1: diamond
  (c,x,y,s,col)=>{
    c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();
    c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.32,y);c.lineTo(x,y+s*0.45);c.lineTo(x-s*0.32,y);c.closePath();c.stroke();
  },
  // Type 2: hexagon
  (c,x,y,s,col)=>{
    c.strokeStyle=col;c.lineWidth=1;c.beginPath();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;c[i===0?'moveTo':'lineTo'](x+Math.cos(a)*s*0.4,y+Math.sin(a)*s*0.4);}
    c.closePath();c.stroke();
    c.beginPath();c.arc(x,y,s*0.1,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  // Type 3: concentric circles
  (c,x,y,s,col)=>{
    c.strokeStyle=col;
    [0.4,0.25,0.12].forEach((r,i)=>{c.lineWidth=1-i*0.2;c.globalAlpha=0.9-i*0.2;c.beginPath();c.arc(x,y,s*r,0,Math.PI*2);c.stroke();});
    c.globalAlpha=1;
  },
  // Type 4: cross
  (c,x,y,s,col)=>{
    c.strokeStyle=col;c.lineWidth=1;
    const r=s*0.38;
    c.beginPath();c.moveTo(x-r,y);c.lineTo(x+r,y);c.moveTo(x,y-r);c.lineTo(x,y+r);c.stroke();
    c.beginPath();c.arc(x,y,r*0.35,0,Math.PI*2);c.fillStyle=col;c.fill();
  },
  // Type 5: square rotated
  (c,x,y,s,col)=>{
    c.strokeStyle=col;c.lineWidth=1.2;
    c.save();c.translate(x,y);c.rotate(Math.PI/4);
    const r=s*0.32;c.strokeRect(-r,-r,r*2,r*2);
    c.restore();
  },
];

function drawPlayer(x,y,col='#fff'){
  ctx.strokeStyle=col;ctx.fillStyle='transparent';ctx.lineWidth=1.5;
  const w=PLAYER_W,h=PLAYER_H;
  // Ship body
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);
  ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w*0.15,y+h*0.3);
  ctx.lineTo(x-w*0.15,y+h*0.3);
  ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath();
  ctx.stroke();
  // Cockpit
  ctx.beginPath();ctx.arc(x,y-h*0.05,h*0.12,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();
}

function initGame(){
  player={x:W/2,y:H-80,speed:IS_RETINA?5:3.5,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];
  waveClearing=false;
  spawnEnemies();
}

function spawnEnemies(){
  enemies=[];
  const cols=8+Math.min(wave-1,4);
  const rows=3+Math.min(Math.floor((wave-1)/2),3);
  const spacing=IS_RETINA?70:48;
  const offX=(W-(cols-1)*spacing)/2;
  const offY=IS_RETINA?110:80;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const type=r<1?5:r<2?3:r%2===0?0:1+Math.floor(r/2)%4;
      enemies.push({
        x:offX+c*spacing, y:offY+r*spacing,
        baseX:offX+c*spacing, baseY:offY+r*spacing,
        type:type%6, hp:r===0?2:1,
        diving:false, diveAngle:0, diveSpeed:0,
        shootTimer:Math.random()*180+60,
        phase:Math.random()*Math.PI*2,
        alive:true
      });
    }
  }
}

let formDir=1,formX=0,formDescent=0,formTarget=0;
const FORM_SPEED=0.4;
const FORM_RANGE=IS_RETINA?60:40;

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}

  // Formation sway
  formX+=FORM_SPEED*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;

  // Descent every 600 frames
  formTarget+=0.012*(1+wave*0.08);

  alive.forEach(e=>{
    if(!e.diving){
      e.x=e.baseX+formX;
      e.y=e.baseY+formDescent+Math.sin(t*0.001+e.phase)*4;
      // Random dive
      if(Math.random()<0.0004*(1+wave*0.3)&&!waveClearing){
        e.diving=true;
        e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);
        e.diveSpeed=IS_RETINA?4.5:3;
      }
      // Shoot
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=120+Math.random()*200-wave*10;
        enemyBullets.push({x:e.x,y:e.y+ENEMY_SIZE/2,vy:IS_RETINA?5:3.5+(wave*0.2)});
      }
    } else {
      // Dive toward player
      e.x+=Math.cos(e.diveAngle)*e.diveSpeed;
      e.y+=Math.sin(e.diveAngle)*e.diveSpeed;
      e.diveSpeed+=0.06;
      // Reset when off screen
      if(e.y>H+60||e.x<-60||e.x>W+60){
        e.diving=false;
        e.x=e.baseX+formX;
        e.y=e.baseY+formDescent;
        e.diveSpeed=IS_RETINA?4.5:3;
      }
    }
  });
  formDescent=formTarget*16;
}

function updateBullets(){
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=IS_RETINA?14:10);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  enemyBullets.forEach(b=>b.y+=b.vy);
}

function spawnParticles(x,y,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.04+Math.random()*0.03});
  }
}

function checkCollisions(){
  // Player bullets vs enemies
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.abs(dx)<ENEMY_SIZE*0.45&&Math.abs(dy)<ENEMY_SIZE*0.45){
        b.dead=true;
        e.hp--;
        if(e.hp<=0){
          e.alive=false;
          score+=e.type===5?200:e.type>2?150:100;
          spawnParticles(e.x,e.y,10);
          updateHUD();
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);

  // Enemy bullets vs player
  enemyBullets.forEach(b=>{
    const dx=b.x-player.x,dy=b.y-player.y;
    if(Math.abs(dx)<player.w*0.45&&Math.abs(dy)<player.h*0.45){
      b.dead=true;
      hitPlayer();
    }
  });
  enemyBullets=enemyBullets.filter(b=>!b.dead);

  // Enemy collision with player (diving)
  enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    const dx=e.x-player.x,dy=e.y-player.y;
    if(Math.abs(dx)<(player.w+ENEMY_SIZE)*0.4&&Math.abs(dy)<(player.h+ENEMY_SIZE)*0.4){
      e.alive=false;
      spawnParticles(e.x,e.y,8);
      hitPlayer();
    }
  });

  // Enemies reach bottom
  enemies.forEach(e=>{
    if(e.alive&&e.y>H-player.h*2){
      e.alive=false;
      spawnParticles(e.x,e.y,6);
    }
  });
}

let playerHitCooldown=0;
function hitPlayer(){
  if(playerHitCooldown>0)return;
  lives--;
  playerHitCooldown=120;
  spawnParticles(player.x,player.y,16);
  updateHUD();
  if(lives<=0){
    setTimeout(()=>showScreen('over'),400);
  }
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.95;p.vy*=0.95;});
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');
  lv.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','14');svg.setAttribute('height','14');
    svg.setAttribute('viewBox','0 0 30 30');
    svg.style.opacity='0.7';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','15,2 28,26 16,20 14,20 2,26');
    p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');
    svg.appendChild(p);lv.appendChild(svg);
  }
}

function draw(t){
  ctx.clearRect(0,0,W,H);

  // Stars background
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<(IS_RETINA?120:80);i++){
    // deterministic stars
    const sx=(Math.sin(i*127.1)*43758.5453)%1*W;
    const sy=(Math.sin(i*311.7)*43758.5453)%1*H;
    const ss=(Math.sin(i*91.3)*0.5+0.5)*1.5+0.3;
    ctx.globalAlpha=(Math.sin(t*0.001+i)*0.3+0.5)*0.6;
    ctx.fillRect(Math.abs(sx),Math.abs(sy),ss,ss);
  }
  ctx.globalAlpha=1;

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*0.8;
    ctx.fillStyle='#fff';
    ctx.fillRect(p.x-1,p.y-1,2,2);
  });
  ctx.globalAlpha=1;

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    const brightness=e.hp>1?1:0.75;
    const col=`rgba(255,255,255,${brightness})`;
    ctx.save();
    ctx.shadowBlur=e.hp>1?10:4;
    ctx.shadowColor='rgba(255,255,255,0.6)';
    ENEMY_DRAWS[e.type](ctx,e.x,e.y,ENEMY_SIZE,col);
    ctx.restore();
  });

  // Player bullets
  bullets.forEach(b=>{
    ctx.fillStyle='#fff';
    ctx.shadowBlur=8;ctx.shadowColor='rgba(255,255,255,0.8)';
    ctx.fillRect(b.x-BULLET_W/2,b.y-BULLET_H/2,BULLET_W,BULLET_H);
  });
  ctx.shadowBlur=0;

  // Enemy bullets
  enemyBullets.forEach(b=>{
    ctx.fillStyle='rgba(200,200,200,0.8)';
    ctx.shadowBlur=4;ctx.shadowColor='rgba(255,255,255,0.4)';
    ctx.fillRect(b.x-1,b.y,BULLET_W,BULLET_H*0.7);
  });
  ctx.shadowBlur=0;

  // Player
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/8)%2===0;
  if(!flicker){
    ctx.shadowBlur=12;ctx.shadowColor='rgba(255,255,255,0.5)';
    drawPlayer(player.x,player.y);
    ctx.shadowBlur=0;
  }
}

function gameLoop(t){
  if(state!=='play'){frameId=null;return;}

  // Input
  const spd=player.speed*(keys['Shift']?1.6:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>shotCooldown){
    lastShot=t;
    bullets.push({x:player.x,y:player.y-player.h/2});
  }

  if(playerHitCooldown>0)playerHitCooldown--;
  updateEnemies(t);
  updateBullets();
  updateParticles();
  checkCollisions();
  draw(t);

  if(waveClearing){
    waveClearing=false;
    setTimeout(()=>showScreen('win'),600);
    return;
  }
  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('over-screen').style.display='none';
  document.getElementById('win-screen').style.display='none';
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){
    document.getElementById('over-screen').style.display='flex';
    document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;
  } else if(s==='win'){
    document.getElementById('win-screen').style.display='flex';
    document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} COMPLETE`;
  } else if(s==='play'){
    state='play';
    if(!frameId)frameId=requestAnimationFrame(gameLoop);
  }
}

function startGame(){
  score=0;wave=1;lives=3;
  formX=0;formDescent=0;formTarget=0;formDir=1;
  updateHUD();
  initGame();
  showScreen('play');
}

function nextWave(){
  wave++;
  formX=0;formDescent=0;formTarget=0;formDir=1;
  bullets=[];enemyBullets=[];particles=[];
  waveClearing=false;
  updateHUD();
  spawnEnemies();
  showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=startGame;
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.key]=false);

// Touch controls
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{ passive:true });
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(player&&state==='play'){player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));}
  touchStartX=e.touches[0].clientX;
},{ passive:true });
document.addEventListener('touchend',()=>{
  if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});
});

updateHUD();
</script>
</body>
</html>
