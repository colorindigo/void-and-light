<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA MONO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0.13;}
#back-btn{position:fixed;top:16px;left:20px;z-index:200;background:transparent;border:none;color:#333;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.2s;}
#back-btn:hover{color:#aaa;}
#canvas{display:block;position:fixed;inset:0;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);}
.hud-val{font-size:0.72rem;letter-spacing:0.2em;opacity:0.6;}
.hud-val span{color:#fff;opacity:1;font-size:1rem;display:block;margin-top:2px;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(10,10,10,0.92);}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.screen p{font-size:0.65rem;letter-spacing:0.2em;opacity:0.3;text-align:center;line-height:2;}
.screen-btn{padding:11px 32px;background:transparent;border:1px solid #333;color:#888;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.screen-btn:hover{border-color:#aaa;color:#fff;}
.diff-row{display:flex;gap:12px;}
.diff-btn{padding:8px 20px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:0.68rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.diff-btn:hover{border-color:#777;color:#ccc;}
.diff-btn.active{border-color:#aaa;color:#fff;}
.diff-label{font-size:0.58rem;letter-spacing:0.2em;opacity:0.25;}
.lives{display:flex;gap:10px;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .hud-val{font-size:0.88rem;}
  .hud-val span{font-size:1.2rem;}
  .screen h1{font-size:2.4rem;}
  .screen p{font-size:0.8rem;}
  .screen-btn{font-size:0.9rem;}
  .diff-btn{font-size:0.82rem;padding:9px 24px;}
  #back-btn{font-size:0.8rem;}
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<button id="back-btn" onclick="window.location.href='../'">&#8592; MONO GAMES</button>
<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES
    <div class="lives" id="lives-val"></div>
  </div>
</div>

<div class="screen" id="start-screen">
  <h1>GALAGA MONO</h1>
  <p>ARROW KEYS or A/D &mdash; MOVE<br>SPACE &mdash; FIRE<br>SURVIVE THE FORMATION</p>
  <div class="diff-label">DIFFICULTY</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('normal',this)">NORMAL</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../'">MENU</button>
</div>

<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function rn(){nc.width=innerWidth;nc.height=innerHeight;}
rn();window.addEventListener('resize',()=>{rn();resize();});
function dn(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(dn,80);

const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();

const IS_RETINA=window.devicePixelRatio>=2;
const PLAYER_W=IS_RETINA?44:30;
const PLAYER_H=IS_RETINA?36:24;

// Bullets — ultra thin
const BULLET_W=IS_RETINA?1:0.8;
const BULLET_H=IS_RETINA?7:5;
const EBULLET_W=IS_RETINA?1:0.8;
const EBULLET_H=IS_RETINA?6:4;

const ENEMY_SIZE=IS_RETINA?27:19;
const SPACING=IS_RETINA?50:34;
const BASE_COLS=11;
const BASE_ROWS=4;

const DIFF={
  easy:{shootMin:300,shootRnd:400,bulletSpd:IS_RETINA?2.2:1.6,diveChance:0.00012,descentPx:28,formSpeed:0.28,waveShootBonus:20,waveBulletBonus:0.08,lives:5},
  normal:{shootMin:180,shootRnd:220,bulletSpd:IS_RETINA?3.2:2.2,diveChance:0.00022,descentPx:36,formSpeed:0.35,waveShootBonus:12,waveBulletBonus:0.12,lives:3},
  hard:{shootMin:90,shootRnd:110,bulletSpd:IS_RETINA?4.5:3.2,diveChance:0.00042,descentPx:48,formSpeed:0.44,waveShootBonus:6,waveBulletBonus:0.18,lives:2},
};
let difficulty='easy',D=DIFF[difficulty];
let waveShootMin,waveBulletSpd,waveDiveChance,waveFormSpeed;

function computeWaveParams(){
  const wb=wave-1;
  waveShootMin=Math.max(D.shootMin-wb*D.waveShootBonus,Math.floor(D.shootMin*0.4));
  waveBulletSpd=Math.min(D.bulletSpd+wb*D.waveBulletBonus,D.bulletSpd+0.6);
  waveDiveChance=Math.min(D.diveChance*(1+wb*0.15),D.diveChance*2.5);
  waveFormSpeed=Math.min(D.formSpeed*(1+wb*0.08),D.formSpeed*1.6);
}
function setDiff(d,btn){
  difficulty=d;D=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

let state='start',score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={},lastShot=0;
const SHOT_COOLDOWN=280;
let frameId,waveClearing=false;
let playerHitCooldown=0;
let formDir=1,formX=0,formDescentOffset=0;
const FORM_RANGE=IS_RETINA?55:36;
const DESCENT_FRAMES=480;
let descentFrame=0;

const ENEMY_DRAWS=[
  (c,x,y,s)=>{c.lineWidth=1;c.beginPath();c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.42,y+s*0.35);c.lineTo(x-s*0.42,y+s*0.35);c.closePath();c.stroke();c.beginPath();c.arc(x,y,s*0.12,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{c.lineWidth=1;c.beginPath();c.moveTo(x,y-s*0.45);c.lineTo(x+s*0.32,y);c.lineTo(x,y+s*0.45);c.lineTo(x-s*0.32,y);c.closePath();c.stroke();},
  (c,x,y,s)=>{c.lineWidth=0.9;c.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;c[i===0?'moveTo':'lineTo'](x+Math.cos(a)*s*0.4,y+Math.sin(a)*s*0.4);}c.closePath();c.stroke();c.beginPath();c.arc(x,y,s*0.1,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{[0.4,0.25,0.12].forEach((r,i)=>{c.lineWidth=0.9-i*0.2;c.globalAlpha=0.9-i*0.2;c.beginPath();c.arc(x,y,s*r,0,Math.PI*2);c.stroke();});c.globalAlpha=1;},
  (c,x,y,s)=>{c.lineWidth=0.9;const r=s*0.38;c.beginPath();c.moveTo(x-r,y);c.lineTo(x+r,y);c.moveTo(x,y-r);c.lineTo(x,y+r);c.stroke();c.beginPath();c.arc(x,y,r*0.35,0,Math.PI*2);c.fillStyle=c.strokeStyle;c.fill();},
  (c,x,y,s)=>{c.lineWidth=1;c.save();c.translate(x,y);c.rotate(Math.PI/4);const r=s*0.32;c.strokeRect(-r,-r,r*2,r*2);c.restore();},
];

function drawPlayer(x,y){
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  const w=PLAYER_W,h=PLAYER_H;
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w*0.15,y+h*0.3);ctx.lineTo(x-w*0.15,y+h*0.3);
  ctx.lineTo(x-w/2,y+h/2);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-h*0.05,h*0.12,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function initGame(){
  player={x:W/2,y:H-80,speed:IS_RETINA?5:3.5,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();spawnEnemies();
}

function spawnEnemies(){
  enemies=[];formDescentOffset=0;descentFrame=0;
  const cols=BASE_COLS+Math.min(wave-1,5);
  const rows=BASE_ROWS+Math.min(Math.floor((wave-1)/2),4);
  const offX=(W-(cols-1)*SPACING)/2;
  const offY=IS_RETINA?100:70;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const type=r<1?5:r<2?3:r%2===0?0:1+Math.floor(r/2)%4;
      enemies.push({
        x:offX+c*SPACING,y:offY+r*SPACING,
        baseX:offX+c*SPACING,baseY:offY+r*SPACING,
        type:type%6,hp:r===0?2:1,
        diving:false,diveAngle:0,diveSpeed:0,
        shootTimer:waveShootMin+Math.random()*D.shootRnd+(r+c)*18,
        phase:Math.random()*Math.PI*2,alive:true
      });
    }
  }
}

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}
  formX+=waveFormSpeed*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;
  if(descentFrame<DESCENT_FRAMES){descentFrame++;formDescentOffset=(descentFrame/DESCENT_FRAMES)*D.descentPx;}
  alive.forEach(e=>{
    if(!e.diving){
      e.x=e.baseX+formX;
      e.y=e.baseY+formDescentOffset+Math.sin(t*0.001+e.phase)*3;
      if(Math.random()<waveDiveChance&&!waveClearing){e.diving=true;e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);e.diveSpeed=IS_RETINA?3.5:2.5;}
      e.shootTimer--;
      if(e.shootTimer<=0){e.shootTimer=waveShootMin+Math.random()*D.shootRnd;enemyBullets.push({x:e.x,y:e.y+ENEMY_SIZE/2,vy:waveBulletSpd});}
    } else {
      e.x+=Math.cos(e.diveAngle)*e.diveSpeed;e.y+=Math.sin(e.diveAngle)*e.diveSpeed;e.diveSpeed+=0.05;
      if(e.y>H+60||e.x<-60||e.x>W+60){e.diving=false;e.x=e.baseX+formX;e.y=e.baseY+formDescentOffset;e.diveSpeed=IS_RETINA?3.5:2.5;}
    }
  });
}

function updateBullets(){
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=IS_RETINA?14:10);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  enemyBullets.forEach(b=>b.y+=b.vy);
}

function spawnParticles(x,y,n=8){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.04+Math.random()*0.03});}
}

function checkCollisions(){
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(b.x-e.x)<ENEMY_SIZE*0.5&&Math.abs(b.y-e.y)<ENEMY_SIZE*0.5){
        b.dead=true;e.hp--;
        if(e.hp<=0){e.alive=false;score+=e.type===5?200:e.type>2?150:100;spawnParticles(e.x,e.y,8);updateHUD();}
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);
  enemyBullets.forEach(b=>{if(Math.abs(b.x-player.x)<player.w*0.45&&Math.abs(b.y-player.y)<player.h*0.45){b.dead=true;hitPlayer();}});
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    if(Math.abs(e.x-player.x)<(player.w+ENEMY_SIZE)*0.4&&Math.abs(e.y-player.y)<(player.h+ENEMY_SIZE)*0.4){e.alive=false;spawnParticles(e.x,e.y,8);hitPlayer();}
  });
  enemies.forEach(e=>{if(e.alive&&e.y>H-player.h*2){e.alive=false;spawnParticles(e.x,e.y,5);}});
}

function hitPlayer(){
  if(playerHitCooldown>0)return;
  lives--;playerHitCooldown=120;spawnParticles(player.x,player.y,16);updateHUD();
  if(lives<=0)setTimeout(()=>showScreen('over'),400);
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.95;p.vy*=0.95;});
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');lv.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','14');svg.setAttribute('height','14');svg.setAttribute('viewBox','0 0 30 30');svg.style.opacity='0.7';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','15,2 28,26 16,20 14,20 2,26');p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');
    svg.appendChild(p);lv.appendChild(svg);
  }
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<(IS_RETINA?120:80);i++){
    const sx=Math.abs((Math.sin(i*127.1)*43758.5453)%1)*W;
    const sy=Math.abs((Math.sin(i*311.7)*43758.5453)%1)*H;
    const ss=(Math.sin(i*91.3)*0.5+0.5)*1.5+0.3;
    ctx.globalAlpha=(Math.sin(t*0.001+i)*0.3+0.5)*0.6;
    ctx.fillStyle='#fff';ctx.fillRect(sx,sy,ss,ss);
  }
  ctx.globalAlpha=1;
  particles.forEach(p=>{ctx.globalAlpha=p.life*0.8;ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,2,2);});
  ctx.globalAlpha=1;
  enemies.forEach(e=>{
    if(!e.alive)return;
    const bri=e.hp>1?1:0.75;
    ctx.save();ctx.strokeStyle=`rgba(255,255,255,${bri})`;ctx.shadowBlur=e.hp>1?8:3;ctx.shadowColor='rgba(255,255,255,0.6)';
    ENEMY_DRAWS[e.type](ctx,e.x,e.y,ENEMY_SIZE);ctx.restore();
  });
  // Player bullets
  ctx.fillStyle='#fff';ctx.shadowBlur=4;ctx.shadowColor='rgba(255,255,255,0.6)';
  bullets.forEach(b=>ctx.fillRect(b.x-BULLET_W/2,b.y-BULLET_H/2,BULLET_W,BULLET_H));
  ctx.shadowBlur=0;
  // Enemy bullets
  ctx.fillStyle='rgba(200,200,200,0.7)';ctx.shadowBlur=2;ctx.shadowColor='rgba(255,255,255,0.25)';
  enemyBullets.forEach(b=>ctx.fillRect(b.x-EBULLET_W/2,b.y,EBULLET_W,EBULLET_H));
  ctx.shadowBlur=0;
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/8)%2===0;
  if(!flicker){ctx.shadowBlur=12;ctx.shadowColor='rgba(255,255,255,0.5)';drawPlayer(player.x,player.y);ctx.shadowBlur=0;}
}

function gameLoop(t){
  if(state!=='play'){frameId=null;return;}
  const spd=player.speed*(keys['Shift']?1.6:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>SHOT_COOLDOWN){lastShot=t;bullets.push({x:player.x,y:player.y-player.h/2});}
  if(playerHitCooldown>0)playerHitCooldown--;
  updateEnemies(t);updateBullets();updateParticles();checkCollisions();draw(t);
  if(waveClearing){waveClearing=false;setTimeout(()=>showScreen('win'),600);return;}
  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  ['start-screen','over-screen','win-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){document.getElementById('over-screen').style.display='flex';document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;}
  else if(s==='win'){document.getElementById('win-screen').style.display='flex';document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} COMPLETE`;}
  else if(s==='play'){state='play';if(!frameId)frameId=requestAnimationFrame(gameLoop);}
}

function startGame(){
  D=DIFF[difficulty];score=0;wave=1;lives=D.lives;
  formX=0;formDir=1;descentFrame=0;formDescentOffset=0;playerHitCooldown=0;
  updateHUD();initGame();showScreen('play');
}
function nextWave(){
  wave++;formX=0;formDir=1;descentFrame=0;formDescentOffset=0;
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();updateHUD();spawnEnemies();showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{document.getElementById('over-screen').style.display='none';document.getElementById('start-screen').style.display='flex';};
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key]=false);

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(player&&state==='play')player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',()=>{if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});});

updateHUD();
</script>
</body>
</html>
