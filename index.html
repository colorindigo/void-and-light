<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONO GAMES</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  #noise{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.15;}
  h1{font-size:1.4rem;letter-spacing:0.6em;color:#555;font-weight:200;margin-bottom:6px;}
  .tagline{font-size:0.6rem;letter-spacing:0.3em;opacity:0.2;margin-bottom:60px;}
  .games{display:flex;gap:32px;}
  .game-card{
    width:260px;padding:32px 24px;border:1px solid #1e1e1e;
    background:transparent;cursor:pointer;text-align:center;
    transition:all 0.3s;text-decoration:none;display:block;
    position:relative;overflow:hidden;
  }
  .game-card::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 70%);
    opacity:0;transition:opacity 0.3s;
  }
  .game-card:hover{border-color:#444;}
  .game-card:hover::before{opacity:1;}
  .game-card .icon{font-size:2rem;margin-bottom:20px;opacity:0.7;}
  .game-card .title{font-size:0.9rem;letter-spacing:0.3em;color:#aaa;margin-bottom:8px;text-transform:uppercase;}
  .game-card .desc{font-size:0.58rem;letter-spacing:0.12em;opacity:0.3;line-height:1.8;}
  .game-card.soon{cursor:default;}
  .game-card.soon:hover{border-color:#1e1e1e;}
  .game-card.soon:hover::before{opacity:0;}
  .soon-tag{font-size:0.5rem;letter-spacing:0.2em;opacity:0.25;margin-top:16px;text-transform:uppercase;}
  @media (-webkit-min-device-pixel-ratio: 2),(min-resolution:192dpi){
    h1{font-size:1.8rem;}
    .tagline{font-size:0.75rem;}
    .game-card{width:300px;padding:36px 28px;}
    .game-card .title{font-size:1.05rem;}
    .game-card .desc{font-size:0.72rem;}
    .soon-tag{font-size:0.65rem;}
  }
</style>
</head>
<body>
<canvas id="noise"></canvas>
<h1>MONO GAMES</h1>
<p class="tagline">MINIMAL · STRATEGIC · MONOCHROME</p>
<div class="games">
  <a class="game-card" href="void-and-light/">
    <div class="icon">⚫⚪</div>
    <div class="title">Void &amp; Light</div>
    <div class="desc">Two forces battle<br>for the color spectrum.<br>Claim. Reinforce. Conquer.</div>
  </a>
  <div class="game-card soon">
    <div class="icon">✦</div>
    <div class="title">Galaxy</div>
    <div class="desc">Galactic scale strategy.<br>Star systems, nebulae,<br>deep space expansion.</div>
    <div class="soon-tag">· coming soon ·</div>
  </div>
</div>
<script>
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function resize(){nc.width=innerWidth;nc.height=innerHeight;}resize();
window.addEventListener('resize',resize);
function drawNoise(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(drawNoise,80);
</script>
</body>
</html>
