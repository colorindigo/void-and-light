<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA MONO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0.13;}
#back-btn{position:fixed;top:16px;left:20px;z-index:200;background:transparent;border:none;color:#333;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.2s;}
#back-btn:hover{color:#aaa;}
#canvas{display:block;position:fixed;inset:0;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);}
.hud-val{font-size:0.72rem;letter-spacing:0.2em;opacity:0.6;}
.hud-val span{color:#fff;opacity:1;font-size:1rem;display:block;margin-top:2px;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(10,10,10,0.92);}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.screen p{font-size:0.65rem;letter-spacing:0.2em;opacity:0.3;text-align:center;line-height:2;}
.screen-btn{padding:11px 32px;background:transparent;border:1px solid #333;color:#888;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.screen-btn:hover{border-color:#aaa;color:#fff;}
.diff-row{display:flex;gap:12px;}
.diff-btn{padding:8px 20px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:0.68rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.diff-btn:hover{border-color:#777;color:#ccc;}
.diff-btn.active{border-color:#aaa;color:#fff;}
.diff-label{font-size:0.58rem;letter-spacing:0.2em;opacity:0.25;}
.lives{display:flex;gap:10px;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .hud-val{font-size:0.88rem;}
  .hud-val span{font-size:1.2rem;}
  .screen h1{font-size:2.4rem;}
  .screen p{font-size:0.8rem;}
  .screen-btn{font-size:0.9rem;}
  .diff-btn{font-size:0.82rem;padding:9px 24px;}
  #back-btn{font-size:0.8rem;}
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<button id="back-btn" onclick="window.location.href='../'">&#8592; MONO GAMES</button>
<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES
    <div class="lives" id="lives-val"></div>
  </div>
</div>

<div class="screen" id="start-screen">
  <h1>GALAGA MONO</h1>
  <p>ARROW KEYS or A/D &mdash; MOVE<br>SPACE &mdash; FIRE<br>SURVIVE THE SWARM</p>
  <div class="diff-label">DIFFICULTY</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('normal',this)">NORMAL</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../'">MENU</button>
</div>

<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
// ── Noise ──
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function rn(){nc.width=innerWidth;nc.height=innerHeight;}
rn();window.addEventListener('resize',()=>{rn();resize();});
function dn(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(dn,80);

// ── Canvas ──
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();

const IS_RETINA=window.devicePixelRatio>=2;
const R=IS_RETINA?2:1;
const PLAYER_W=30*R, PLAYER_H=24*R;
const BW=1*R, BH=10*R;   // bullet: thin and short
const ES=18*R;            // enemy size — smaller

// ── Difficulty ──
const DIFF={
  easy:{shootMin:300,shootRnd:400,bulletSpd:1.6*R,diveChance:0.00012,descentPx:28,formSpeed:0.28,waveShootBonus:20,waveBulletBonus:0.08*R,lives:5},
  normal:{shootMin:180,shootRnd:220,bulletSpd:2.2*R,diveChance:0.00022,descentPx:36,formSpeed:0.35,waveShootBonus:12,waveBulletBonus:0.12*R,lives:3},
  hard:{shootMin:90,shootRnd:110,bulletSpd:3.2*R,diveChance:0.00042,descentPx:48,formSpeed:0.44,waveShootBonus:6,waveBulletBonus:0.18*R,lives:2},
};
let difficulty='easy',D=DIFF[difficulty];
let waveShootMin,waveBulletSpd,waveDiveChance,waveFormSpeed;

function computeWaveParams(){
  const wb=wave-1;
  waveShootMin=Math.max(D.shootMin-wb*D.waveShootBonus,Math.floor(D.shootMin*0.4));
  waveBulletSpd=Math.min(D.bulletSpd+wb*D.waveBulletBonus,D.bulletSpd+0.6*R);
  waveDiveChance=Math.min(D.diveChance*(1+wb*0.15),D.diveChance*2.5);
  waveFormSpeed=Math.min(D.formSpeed*(1+wb*0.08),D.formSpeed*1.6);
}
function setDiff(d,btn){
  difficulty=d;D=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

let state='start',score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={},lastShot=0;
const SHOT_COOLDOWN=260;
let frameId,waveClearing=false;
let playerHitCooldown=0;
let formDir=1,formX=0,formDescentOffset=0;
const FORM_RANGE=IS_RETINA?55:38;
const DESCENT_FRAMES=480;
let descentFrame=0;

// ── ENEMY DRAWS — geometric, angular, bug-like ──
// All use simple strokes, no gradients, no fills except dots

// Type 0: Worker bug — squat rectangular body, short mandibles, dot eyes
function drawWorker(c,x,y,s){
  const h=s*0.5,w=s*0.7;
  c.strokeRect(x-w,y-h,w*2,h*2);              // main body
  c.strokeRect(x-w*0.5,y-h*1.3,w,h*0.5);      // head block
  // mandibles
  c.beginPath();c.moveTo(x-w*0.35,y+h);c.lineTo(x-w*0.55,y+h*1.5);c.stroke();
  c.beginPath();c.moveTo(x+w*0.35,y+h);c.lineTo(x+w*0.55,y+h*1.5);c.stroke();
  // antenna
  c.beginPath();c.moveTo(x-w*0.25,y-h*1.3);c.lineTo(x-w*0.4,y-h*1.9);c.stroke();
  c.beginPath();c.moveTo(x+w*0.25,y-h*1.3);c.lineTo(x+w*0.4,y-h*1.9);c.stroke();
  // eyes
  c.fillStyle=c.strokeStyle;
  c.fillRect(x-w*0.3,y-h*1.1,s*0.1,s*0.1);
  c.fillRect(x+w*0.2,y-h*1.1,s*0.1,s*0.1);
}

// Type 1: Hornet — narrow waist, swept angular wings, stinger
function drawHornet(c,x,y,s){
  // thorax
  c.strokeRect(x-s*0.22,y-s*0.38,s*0.44,s*0.38);
  // abdomen — narrower
  c.beginPath();
  c.moveTo(x-s*0.18,y);c.lineTo(x-s*0.14,y+s*0.42);
  c.lineTo(x+s*0.14,y+s*0.42);c.lineTo(x+s*0.18,y);
  c.closePath();c.stroke();
  // stinger
  c.beginPath();c.moveTo(x-s*0.07,y+s*0.42);c.lineTo(x,y+s*0.62);c.lineTo(x+s*0.07,y+s*0.42);c.stroke();
  // wings — angular triangles
  c.beginPath();c.moveTo(x-s*0.22,y-s*0.1);c.lineTo(x-s*0.7,y-s*0.35);c.lineTo(x-s*0.55,y+s*0.05);c.closePath();c.stroke();
  c.beginPath();c.moveTo(x+s*0.22,y-s*0.1);c.lineTo(x+s*0.7,y-s*0.35);c.lineTo(x+s*0.55,y+s*0.05);c.closePath();c.stroke();
  // eyes
  c.fillStyle=c.strokeStyle;
  c.fillRect(x-s*0.14,y-s*0.3,s*0.09,s*0.09);
  c.fillRect(x+s*0.05,y-s*0.3,s*0.09,s*0.09);
}

// Type 2: Crab — wide flat body, angular claws, eye stalks
function drawCrab(c,x,y,s){
  // body — wide flat rect
  c.strokeRect(x-s*0.55,y-s*0.2,s*1.1,s*0.4);
  // left claw
  c.beginPath();c.moveTo(x-s*0.55,y-s*0.1);c.lineTo(x-s*0.85,y-s*0.32);c.lineTo(x-s*0.95,y-s*0.12);c.stroke();
  c.beginPath();c.moveTo(x-s*0.85,y-s*0.32);c.lineTo(x-s*0.95,y-s*0.42);c.stroke();
  // right claw
  c.beginPath();c.moveTo(x+s*0.55,y-s*0.1);c.lineTo(x+s*0.85,y-s*0.32);c.lineTo(x+s*0.95,y-s*0.12);c.stroke();
  c.beginPath();c.moveTo(x+s*0.85,y-s*0.32);c.lineTo(x+s*0.95,y-s*0.42);c.stroke();
  // legs (3 per side, short)
  [-0.1,0.05,0.2].forEach(dy=>{
    c.beginPath();c.moveTo(x-s*0.55,y+dy*s);c.lineTo(x-s*0.75,y+(dy+0.2)*s);c.stroke();
    c.beginPath();c.moveTo(x+s*0.55,y+dy*s);c.lineTo(x+s*0.75,y+(dy+0.2)*s);c.stroke();
  });
  // eye stalks + dot
  c.beginPath();c.moveTo(x-s*0.2,y-s*0.2);c.lineTo(x-s*0.24,y-s*0.44);c.stroke();
  c.beginPath();c.moveTo(x+s*0.2,y-s*0.2);c.lineTo(x+s*0.24,y-s*0.44);c.stroke();
  c.fillStyle=c.strokeStyle;
  c.fillRect(x-s*0.29,y-s*0.48,s*0.1,s*0.1);
  c.fillRect(x+s*0.19,y-s*0.48,s*0.1,s*0.1);
}

// Type 3: Spider — octagonal body, 8 angled legs, fang tips
function drawSpider(c,x,y,s){
  // octagon body
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2-Math.PI/8;
    i===0?c.moveTo(x+Math.cos(a)*s*0.32,y+Math.sin(a)*s*0.32):c.lineTo(x+Math.cos(a)*s*0.32,y+Math.sin(a)*s*0.32);
  }
  c.closePath();c.stroke();
  // 8 legs — 4 per side, bent at elbow
  const legData=[
    [-0.32,-0.18,-0.68,-0.42,-0.88,-0.22],
    [-0.32,-0.05,-0.7,-0.14,-0.92,0.1],
    [-0.32,0.1,-0.68,0.18,-0.86,0.4],
    [-0.32,0.22,-0.6,0.36,-0.75,0.6],
  ];
  legData.forEach(([x1,y1,x2,y2,x3,y3])=>{
    c.beginPath();c.moveTo(x+x1*s,y+y1*s);c.lineTo(x+x2*s,y+y2*s);c.lineTo(x+x3*s,y+y3*s);c.stroke();
    c.beginPath();c.moveTo(x-x1*s,y+y1*s);c.lineTo(x-x2*s,y+y2*s);c.lineTo(x-x3*s,y+y3*s);c.stroke();
  });
  // fangs
  c.beginPath();c.moveTo(x-s*0.1,y-s*0.32);c.lineTo(x-s*0.14,y-s*0.52);c.stroke();
  c.beginPath();c.moveTo(x+s*0.1,y-s*0.32);c.lineTo(x+s*0.14,y-s*0.52);c.stroke();
  // 4 eye dots
  c.fillStyle=c.strokeStyle;
  [-0.16,-0.06,0.06,0.16].forEach(dx=>{c.fillRect(x+dx*s-s*0.04,y-s*0.1,s*0.08,s*0.08);});
}

// Type 4: Mantis — triangular head, V-arms, narrow body
function drawMantis(c,x,y,s){
  // head
  c.beginPath();c.moveTo(x,y-s*0.55);c.lineTo(x+s*0.22,y-s*0.24);c.lineTo(x-s*0.22,y-s*0.24);c.closePath();c.stroke();
  // body
  c.beginPath();c.moveTo(x-s*0.12,y-s*0.22);c.lineTo(x-s*0.1,y+s*0.38);c.lineTo(x+s*0.1,y+s*0.38);c.lineTo(x+s*0.12,y-s*0.22);c.closePath();c.stroke();
  // spiked raptorial arms — V shape with spike
  c.beginPath();c.moveTo(x-s*0.12,y-s*0.08);c.lineTo(x-s*0.48,y-s*0.38);c.lineTo(x-s*0.32,y-s*0.56);c.stroke();
  c.beginPath();c.moveTo(x-s*0.44,y-s*0.4);c.lineTo(x-s*0.56,y-s*0.3);c.stroke();
  c.beginPath();c.moveTo(x+s*0.12,y-s*0.08);c.lineTo(x+s*0.48,y-s*0.38);c.lineTo(x+s*0.32,y-s*0.56);c.stroke();
  c.beginPath();c.moveTo(x+s*0.44,y-s*0.4);c.lineTo(x+s*0.56,y-s*0.3);c.stroke();
  // small wings
  c.beginPath();c.moveTo(x-s*0.12,y);c.lineTo(x-s*0.4,y+s*0.1);c.lineTo(x-s*0.2,y+s*0.3);c.stroke();
  c.beginPath();c.moveTo(x+s*0.12,y);c.lineTo(x+s*0.4,y+s*0.1);c.lineTo(x+s*0.2,y+s*0.3);c.stroke();
  // eyes
  c.fillStyle=c.strokeStyle;
  c.fillRect(x-s*0.12,y-s*0.46,s*0.09,s*0.09);
  c.fillRect(x+s*0.03,y-s*0.46,s*0.09,s*0.09);
}

// Type 5: Moth boss — wide angular wings, thick body, antenna balls
function drawMoth(c,x,y,s,t){
  const flap=Math.sin(t*0.05)*s*0.04;
  // upper wings — angular polygon
  c.beginPath();
  c.moveTo(x-s*0.1,y-s*0.1+flap);
  c.lineTo(x-s*0.62,y-s*0.52+flap);
  c.lineTo(x-s*0.78,y-s*0.1);
  c.lineTo(x-s*0.52,y+s*0.18);
  c.lineTo(x-s*0.12,y+s*0.06);
  c.closePath();c.stroke();
  c.beginPath();
  c.moveTo(x+s*0.1,y-s*0.1+flap);
  c.lineTo(x+s*0.62,y-s*0.52+flap);
  c.lineTo(x+s*0.78,y-s*0.1);
  c.lineTo(x+s*0.52,y+s*0.18);
  c.lineTo(x+s*0.12,y+s*0.06);
  c.closePath();c.stroke();
  // lower wings — smaller triangles
  c.beginPath();c.moveTo(x-s*0.12,y+s*0.06);c.lineTo(x-s*0.44,y+s*0.14);c.lineTo(x-s*0.3,y+s*0.48);c.lineTo(x-s*0.1,y+s*0.38);c.closePath();c.stroke();
  c.beginPath();c.moveTo(x+s*0.12,y+s*0.06);c.lineTo(x+s*0.44,y+s*0.14);c.lineTo(x+s*0.3,y+s*0.48);c.lineTo(x+s*0.1,y+s*0.38);c.closePath();c.stroke();
  // body rect
  c.strokeRect(x-s*0.1,y-s*0.28,s*0.2,s*0.68);
  // antenna + ball
  c.beginPath();c.moveTo(x-s*0.06,y-s*0.28);c.lineTo(x-s*0.22,y-s*0.62);c.stroke();
  c.beginPath();c.moveTo(x+s*0.06,y-s*0.28);c.lineTo(x+s*0.22,y-s*0.62);c.stroke();
  c.fillStyle=c.strokeStyle;
  c.fillRect(x-s*0.26,y-s*0.66,s*0.09,s*0.09);
  c.fillRect(x+s*0.17,y-s*0.66,s*0.09,s*0.09);
  // wing spot squares
  c.fillRect(x-s*0.46,y-s*0.2,s*0.1,s*0.1);
  c.fillRect(x+s*0.36,y-s*0.2,s*0.1,s*0.1);
}

const ENEMY_DRAWS=[drawWorker,drawHornet,drawCrab,drawSpider,drawMantis,drawMoth];

// ── Simple player ship (original style) ──
function drawPlayer(x,y){
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5*R;
  const w=PLAYER_W,h=PLAYER_H;
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);
  ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w*0.15,y+h*0.3);
  ctx.lineTo(x-w*0.15,y+h*0.3);
  ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-h*0.05,h*0.13,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

// ── Game ──
function initGame(){
  player={x:W/2,y:H-80,speed:IS_RETINA?5:3.5,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];
  waveClearing=false;
  computeWaveParams();spawnEnemies();
}

function spawnEnemies(){
  enemies=[];formDescentOffset=0;descentFrame=0;
  const cols=8+Math.min(wave-1,4);
  const rows=3+Math.min(Math.floor((wave-1)/2),3);
  const spacing=IS_RETINA?66:44;
  const offX=(W-(cols-1)*spacing)/2;
  const offY=IS_RETINA?100:72;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const typeMap=[5,4,2,3,1,0];
      const type=typeMap[Math.min(r,typeMap.length-1)];
      enemies.push({
        x:offX+c*spacing,y:offY+r*spacing,
        baseX:offX+c*spacing,baseY:offY+r*spacing,
        type,hp:r===0?3:r===1?2:1,
        diving:false,diveAngle:0,diveSpeed:0,
        shootTimer:waveShootMin+Math.random()*D.shootRnd+(r+c)*18,
        phase:Math.random()*Math.PI*2,
        alive:true,animT:Math.random()*200
      });
    }
  }
}

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}
  formX+=waveFormSpeed*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;
  if(descentFrame<DESCENT_FRAMES){descentFrame++;formDescentOffset=(descentFrame/DESCENT_FRAMES)*D.descentPx;}
  alive.forEach(e=>{
    e.animT++;
    if(!e.diving){
      e.x=e.baseX+formX;
      e.y=e.baseY+formDescentOffset+Math.sin(t*0.001+e.phase)*3;
      if(Math.random()<waveDiveChance&&!waveClearing){
        e.diving=true;
        e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);
        e.diveSpeed=2*R;
      }
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=waveShootMin+Math.random()*D.shootRnd;
        enemyBullets.push({x:e.x,y:e.y+ES*0.6,vy:waveBulletSpd});
      }
    } else {
      e.x+=Math.cos(e.diveAngle)*e.diveSpeed;
      e.y+=Math.sin(e.diveAngle)*e.diveSpeed;
      e.diveSpeed+=0.04;
      if(e.y>H+60||e.x<-60||e.x>W+60){
        e.diving=false;e.x=e.baseX+formX;e.y=e.baseY+formDescentOffset;e.diveSpeed=2*R;
      }
    }
  });
}

function updateBullets(){
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=12*R);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  enemyBullets.forEach(b=>b.y+=b.vy);
}

function spawnParticles(x,y,n=7){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.045+Math.random()*0.03});
  }
}

function checkCollisions(){
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(b.x-e.x)<ES*0.55&&Math.abs(b.y-e.y)<ES*0.55){
        b.dead=true;e.hp--;
        if(e.hp<=0){
          e.alive=false;
          score+=(e.type===5?300:e.type===4?200:e.type===3?180:e.type===2?160:e.type===1?130:100);
          spawnParticles(e.x,e.y,10);updateHUD();
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);
  enemyBullets.forEach(b=>{
    if(Math.abs(b.x-player.x)<player.w*0.4&&Math.abs(b.y-player.y)<player.h*0.4){b.dead=true;hitPlayer();}
  });
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    if(Math.abs(e.x-player.x)<(player.w+ES)*0.38&&Math.abs(e.y-player.y)<(player.h+ES)*0.38){
      e.alive=false;spawnParticles(e.x,e.y,10);hitPlayer();
    }
  });
  enemies.forEach(e=>{if(e.alive&&e.y>H-player.h*2){e.alive=false;spawnParticles(e.x,e.y,5);}});
}

function hitPlayer(){
  if(playerHitCooldown>0)return;
  lives--;playerHitCooldown=120;
  spawnParticles(player.x,player.y,16);updateHUD();
  if(lives<=0)setTimeout(()=>showScreen('over'),400);
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.95;p.vy*=0.95;});
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');lv.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','14');svg.setAttribute('height','14');svg.setAttribute('viewBox','0 0 30 30');svg.style.opacity='0.7';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','15,2 28,26 16,20 14,20 2,26');p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');
    svg.appendChild(p);lv.appendChild(svg);
  }
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  // Stars — no fillStyle calls in loop body except once
  ctx.fillStyle='#fff';
  for(let i=0;i<(IS_RETINA?100:68);i++){
    const sx=Math.abs((Math.sin(i*127.1)*43758.5)%1)*W;
    const sy=Math.abs((Math.sin(i*311.7)*43758.5)%1)*H;
    const ss=((Math.sin(i*91.3)*0.5+0.5)*1.4+0.3);
    ctx.globalAlpha=(Math.sin(t*0.001+i)*0.3+0.5)*0.5;
    ctx.fillRect(sx,sy,ss,ss);
  }
  ctx.globalAlpha=1;

  // Particles
  ctx.fillStyle='#fff';
  particles.forEach(p=>{ctx.globalAlpha=p.life*0.8;ctx.fillRect(p.x-1,p.y-1,2,2);});
  ctx.globalAlpha=1;

  // Enemies — no gradients, just strokes
  enemies.forEach(e=>{
    if(!e.alive)return;
    const bri=e.hp>2?1:e.hp>1?0.8:0.6;
    ctx.save();
    ctx.strokeStyle=`rgba(255,255,255,${bri})`;
    ctx.lineWidth=1*R;
    ctx.shadowBlur=e.hp>1?8:3;
    ctx.shadowColor=`rgba(255,255,255,${bri*0.6})`;
    ENEMY_DRAWS[e.type](ctx,e.x,e.y,ES,e.animT);
    ctx.restore();
  });

  // Player bullets — thin single pixel line
  ctx.fillStyle='#fff';
  ctx.shadowBlur=6;ctx.shadowColor='rgba(255,255,255,0.8)';
  bullets.forEach(b=>ctx.fillRect(b.x-BW/2,b.y-BH/2,BW,BH));
  ctx.shadowBlur=0;

  // Enemy bullets — slightly wider but still thin
  ctx.fillStyle='rgba(200,200,200,0.9)';
  ctx.shadowBlur=3;ctx.shadowColor='rgba(255,255,255,0.3)';
  enemyBullets.forEach(b=>ctx.fillRect(b.x-BW,b.y,BW*2,BH*0.8));
  ctx.shadowBlur=0;

  // Player
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/7)%2===0;
  if(!flicker){
    ctx.shadowBlur=10;ctx.shadowColor='rgba(255,255,255,0.4)';
    drawPlayer(player.x,player.y);
    ctx.shadowBlur=0;
  }
}

function gameLoop(t){
  if(state!=='play'){frameId=null;return;}
  const spd=player.speed*(keys['Shift']?1.6:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>SHOT_COOLDOWN){lastShot=t;bullets.push({x:player.x,y:player.y-player.h/2});}
  if(playerHitCooldown>0)playerHitCooldown--;
  updateEnemies(t);updateBullets();updateParticles();checkCollisions();draw(t);
  if(waveClearing){waveClearing=false;setTimeout(()=>showScreen('win'),600);return;}
  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  ['start-screen','over-screen','win-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){document.getElementById('over-screen').style.display='flex';document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;}
  else if(s==='win'){document.getElementById('win-screen').style.display='flex';document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} COMPLETE`;}
  else if(s==='play'){state='play';if(!frameId)frameId=requestAnimationFrame(gameLoop);}
}

function startGame(){
  D=DIFF[difficulty];score=0;wave=1;lives=D.lives;
  formX=0;formDir=1;descentFrame=0;formDescentOffset=0;playerHitCooldown=0;
  updateHUD();initGame();showScreen('play');
}
function nextWave(){
  wave++;formX=0;formDir=1;descentFrame=0;formDescentOffset=0;
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();updateHUD();spawnEnemies();showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{document.getElementById('over-screen').style.display='none';document.getElementById('start-screen').style.display='flex';};
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key]=false);

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(player&&state==='play')player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',()=>{if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});});

updateHUD();
</script>
</body>
