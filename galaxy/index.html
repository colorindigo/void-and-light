<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAGA MONO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#noise{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0.13;}
#back-btn{position:fixed;top:16px;left:20px;z-index:200;background:transparent;border:none;color:#333;font-family:'Courier New',monospace;font-size:0.62rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:color 0.2s;}
#back-btn:hover{color:#aaa;}
#canvas{display:block;position:fixed;inset:0;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);}
.hud-val{font-size:0.72rem;letter-spacing:0.2em;opacity:0.6;}
.hud-val span{color:#fff;opacity:1;font-size:1rem;display:block;margin-top:2px;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(10,10,10,0.92);}
.screen h1{font-size:1.8rem;letter-spacing:0.5em;color:#ccc;font-weight:200;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.screen p{font-size:0.65rem;letter-spacing:0.2em;opacity:0.3;text-align:center;line-height:2;}
.screen-btn{padding:11px 32px;background:transparent;border:1px solid #333;color:#888;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.25s;}
.screen-btn:hover{border-color:#aaa;color:#fff;}
.diff-row{display:flex;gap:12px;}
.diff-btn{padding:8px 20px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:0.68rem;letter-spacing:0.2em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.diff-btn:hover{border-color:#777;color:#ccc;}
.diff-btn.active{border-color:#aaa;color:#fff;}
.diff-label{font-size:0.58rem;letter-spacing:0.2em;opacity:0.25;}
.lives{display:flex;gap:10px;}
@media (-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .hud-val{font-size:0.88rem;}
  .hud-val span{font-size:1.2rem;}
  .screen h1{font-size:2.4rem;}
  .screen p{font-size:0.8rem;}
  .screen-btn{font-size:0.9rem;}
  .diff-btn{font-size:0.82rem;padding:9px 24px;}
  #back-btn{font-size:0.8rem;}
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<button id="back-btn" onclick="window.location.href='../'">&#8592; MONO GAMES</button>
<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div class="hud-val">SCORE<span id="score-val">0</span></div>
  <div class="hud-val" style="text-align:center">WAVE<span id="wave-val">1</span></div>
  <div class="hud-val" style="text-align:right">LIVES
    <div class="lives" id="lives-val"></div>
  </div>
</div>

<div class="screen" id="start-screen">
  <h1>GALAGA MONO</h1>
  <p>ARROW KEYS or A/D &mdash; MOVE<br>SPACE &mdash; FIRE<br>SURVIVE THE SWARM</p>
  <div class="diff-label">DIFFICULTY</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">EASY</button>
    <button class="diff-btn" onclick="setDiff('normal',this)">NORMAL</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
  </div>
  <button class="screen-btn" id="start-btn">BEGIN</button>
</div>

<div class="screen" id="over-screen" style="display:none">
  <h1>GAME OVER</h1>
  <p id="final-score"></p>
  <button class="screen-btn" id="retry-btn">RETRY</button>
  <button class="screen-btn" onclick="window.location.href='../'">MENU</button>
</div>

<div class="screen" id="win-screen" style="display:none">
  <h1>SECTOR CLEAR</h1>
  <p id="win-score"></p>
  <button class="screen-btn" id="next-btn">NEXT WAVE</button>
</div>

<script>
// ── Noise ──
const nc=document.getElementById('noise'),nctx=nc.getContext('2d');
function rn(){nc.width=innerWidth;nc.height=innerHeight;}
rn();window.addEventListener('resize',()=>{rn();resize();});
function dn(){const img=nctx.createImageData(nc.width,nc.height);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}nctx.putImageData(img,0,0);}
setInterval(dn,80);

// ── Canvas ──
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();

const IS_RETINA=window.devicePixelRatio>=2;
const R=IS_RETINA?2:1; // scale factor
const PLAYER_W=32*R, PLAYER_H=38*R;
const BULLET_W=2*R, BULLET_H=14*R;
const ENEMY_SIZE=22*R;

// ── Difficulty ──
const DIFF={
  easy:{shootMin:300,shootRnd:400,bulletSpd:1.6*R,diveChance:0.00012,descentPx:28,formSpeed:0.28,waveShootBonus:20,waveBulletBonus:0.08*R,lives:5},
  normal:{shootMin:180,shootRnd:220,bulletSpd:2.2*R,diveChance:0.00022,descentPx:36,formSpeed:0.35,waveShootBonus:12,waveBulletBonus:0.12*R,lives:3},
  hard:{shootMin:90,shootRnd:110,bulletSpd:3.2*R,diveChance:0.00042,descentPx:48,formSpeed:0.44,waveShootBonus:6,waveBulletBonus:0.18*R,lives:2},
};
let difficulty='easy', D=DIFF[difficulty];
let waveShootMin,waveBulletSpd,waveDiveChance,waveFormSpeed;

function computeWaveParams(){
  const wb=wave-1;
  waveShootMin=Math.max(D.shootMin-wb*D.waveShootBonus,Math.floor(D.shootMin*0.4));
  waveBulletSpd=Math.min(D.bulletSpd+wb*D.waveBulletBonus,D.bulletSpd+0.6*R);
  waveDiveChance=Math.min(D.diveChance*(1+wb*0.15),D.diveChance*2.5);
  waveFormSpeed=Math.min(D.formSpeed*(1+wb*0.08),D.formSpeed*1.6);
}
function setDiff(d,btn){
  difficulty=d;D=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

let state='start',score=0,wave=1,lives=3;
let player,bullets,enemyBullets,enemies,particles;
let keys={},lastShot=0;
const SHOT_COOLDOWN=260;
let frameId,waveClearing=false;

// ── ENEMY DESIGNS — bug/alien shapes ──
// Type 0: Scarab beetle — wide carapace, mandibles, antenna
function drawBeetle(c,x,y,s,col,t){
  c.strokeStyle=col; c.fillStyle='transparent';
  const sc=s*0.9;
  // Wing cases (elytra) — two curved halves
  c.lineWidth=1.2;
  c.beginPath();
  c.moveTo(x,y-sc*0.38);
  c.bezierCurveTo(x+sc*0.55,y-sc*0.3, x+sc*0.52,y+sc*0.28, x+sc*0.08,y+sc*0.38);
  c.lineTo(x-sc*0.08,y+sc*0.38);
  c.bezierCurveTo(x-sc*0.52,y+sc*0.28, x-sc*0.55,y-sc*0.3, x,y-sc*0.38);
  c.stroke();
  // Center spine line
  c.lineWidth=0.7; c.globalAlpha*=0.8;
  c.beginPath(); c.moveTo(x,y-sc*0.36); c.lineTo(x,y+sc*0.36); c.stroke();
  c.globalAlpha=1;
  // Mandibles
  c.lineWidth=1;
  c.beginPath(); c.moveTo(x-sc*0.1,y+sc*0.36); c.lineTo(x-sc*0.28,y+sc*0.55); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.1,y+sc*0.36); c.lineTo(x+sc*0.28,y+sc*0.55); c.stroke();
  // Antennae
  c.lineWidth=0.8;
  c.beginPath(); c.moveTo(x-sc*0.12,y-sc*0.36); c.quadraticCurveTo(x-sc*0.3,y-sc*0.6,x-sc*0.2,y-sc*0.72); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.12,y-sc*0.36); c.quadraticCurveTo(x+sc*0.3,y-sc*0.6,x+sc*0.2,y-sc*0.72); c.stroke();
  // Eye dots
  c.fillStyle=col;
  c.beginPath(); c.arc(x-sc*0.14,y-sc*0.18,sc*0.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.14,y-sc*0.18,sc*0.07,0,Math.PI*2); c.fill();
}

// Type 1: Hornet — segmented body, swept wings, stinger
function drawHornet(c,x,y,s,col,t){
  c.strokeStyle=col; c.lineWidth=1.1;
  const sc=s*0.92;
  // Wings (swept back)
  c.beginPath();
  c.moveTo(x-sc*0.08,y-sc*0.05);
  c.bezierCurveTo(x-sc*0.5,y-sc*0.35,x-sc*0.62,y+sc*0.1,x-sc*0.38,y+sc*0.2);
  c.lineTo(x-sc*0.08,y+sc*0.05); c.stroke();
  c.beginPath();
  c.moveTo(x+sc*0.08,y-sc*0.05);
  c.bezierCurveTo(x+sc*0.5,y-sc*0.35,x+sc*0.62,y+sc*0.1,x+sc*0.38,y+sc*0.2);
  c.lineTo(x+sc*0.08,y+sc*0.05); c.stroke();
  // Body segments
  c.lineWidth=1.3;
  c.beginPath(); c.ellipse(x,y-sc*0.12,sc*0.14,sc*0.22,0,0,Math.PI*2); c.stroke();
  c.beginPath(); c.ellipse(x,y+sc*0.18,sc*0.11,sc*0.18,0,0,Math.PI*2); c.stroke();
  // Stinger
  c.lineWidth=1;
  c.beginPath(); c.moveTo(x,y+sc*0.36); c.lineTo(x,y+sc*0.52); c.stroke();
  c.beginPath(); c.moveTo(x-sc*0.06,y+sc*0.48); c.lineTo(x,y+sc*0.56); c.lineTo(x+sc*0.06,y+sc*0.48); c.stroke();
  // Eyes
  c.fillStyle=col;
  c.beginPath(); c.arc(x-sc*0.08,y-sc*0.28,sc*0.06,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.08,y-sc*0.28,sc*0.06,0,Math.PI*2); c.fill();
}

// Type 2: Crab alien — wide claws, round body, multiple legs
function drawCrab(c,x,y,s,col,t){
  c.strokeStyle=col; c.lineWidth=1.1;
  const sc=s*0.95;
  // Body
  c.beginPath(); c.ellipse(x,y,sc*0.28,sc*0.22,0,0,Math.PI*2); c.stroke();
  // Claws left
  c.lineWidth=1.2;
  c.beginPath(); c.moveTo(x-sc*0.28,y); c.lineTo(x-sc*0.5,y-sc*0.18); c.lineTo(x-sc*0.62,y-sc*0.1); c.stroke();
  c.beginPath(); c.moveTo(x-sc*0.5,y-sc*0.18); c.lineTo(x-sc*0.62,y+sc*0.06); c.stroke();
  // Claws right
  c.beginPath(); c.moveTo(x+sc*0.28,y); c.lineTo(x+sc*0.5,y-sc*0.18); c.lineTo(x+sc*0.62,y-sc*0.1); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.5,y-sc*0.18); c.lineTo(x+sc*0.62,y+sc*0.06); c.stroke();
  // Legs (3 per side)
  c.lineWidth=0.7;
  [-0.12,0,0.12].forEach((dy,i)=>{
    c.beginPath(); c.moveTo(x-sc*0.26,y+dy*sc); c.lineTo(x-sc*0.44,y+(dy+0.18)*sc); c.stroke();
    c.beginPath(); c.moveTo(x+sc*0.26,y+dy*sc); c.lineTo(x+sc*0.44,y+(dy+0.18)*sc); c.stroke();
  });
  // Eyes on stalks
  c.lineWidth=0.8;
  c.beginPath(); c.moveTo(x-sc*0.1,y-sc*0.22); c.lineTo(x-sc*0.14,y-sc*0.38); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.1,y-sc*0.22); c.lineTo(x+sc*0.14,y-sc*0.38); c.stroke();
  c.fillStyle=col;
  c.beginPath(); c.arc(x-sc*0.14,y-sc*0.4,sc*0.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.14,y-sc*0.4,sc*0.07,0,Math.PI*2); c.fill();
}

// Type 3: Spider — round abdomen, 8 jagged legs
function drawSpider(c,x,y,s,col,t){
  c.strokeStyle=col; c.lineWidth=1;
  const sc=s*0.9;
  // Abdomen
  c.beginPath(); c.arc(x,y+sc*0.1,sc*0.25,0,Math.PI*2); c.stroke();
  // Thorax
  c.beginPath(); c.arc(x,y-sc*0.18,sc*0.16,0,Math.PI*2); c.stroke();
  // 8 legs (4 per side), jagged
  const legAngles=[-0.55,-0.3,-0.05,0.2];
  legAngles.forEach((a,i)=>{
    const lx1=x-sc*0.16,ly1=y+(a-0.1)*sc;
    const lx2=lx1-sc*(0.28+i*0.04),ly2=ly1-sc*0.12;
    const lx3=lx2-sc*0.18,ly3=ly2+sc*0.22;
    c.beginPath(); c.moveTo(lx1,ly1); c.lineTo(lx2,ly2); c.lineTo(lx3,ly3); c.stroke();
    const rx1=x+sc*0.16,ry1=ly1;
    const rx2=rx1+sc*(0.28+i*0.04),ry2=ry1-sc*0.12;
    const rx3=rx2+sc*0.18,ry3=ry2+sc*0.22;
    c.beginPath(); c.moveTo(rx1,ry1); c.lineTo(rx2,ry2); c.lineTo(rx3,ry3); c.stroke();
  });
  // Fangs
  c.lineWidth=1.1;
  c.beginPath(); c.moveTo(x-sc*0.08,y-sc*0.34); c.lineTo(x-sc*0.13,y-sc*0.5); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.08,y-sc*0.34); c.lineTo(x+sc*0.13,y-sc*0.5); c.stroke();
  // Eyes cluster
  c.fillStyle=col;
  [-0.12,-0.04,0.04,0.12].forEach(dx=>{
    c.beginPath(); c.arc(x+dx*sc,y-sc*0.18,sc*0.04,0,Math.PI*2); c.fill();
  });
}

// Type 4: Mantis — triangular head, spiked forelegs, folded wings
function drawMantis(c,x,y,s,col,t){
  c.strokeStyle=col; c.lineWidth=1.1;
  const sc=s*0.9;
  // Head triangle
  c.beginPath(); c.moveTo(x,y-sc*0.48); c.lineTo(x+sc*0.2,y-sc*0.2); c.lineTo(x-sc*0.2,y-sc*0.2); c.closePath(); c.stroke();
  // Body
  c.beginPath(); c.moveTo(x-sc*0.12,y-sc*0.18); c.lineTo(x-sc*0.1,y+sc*0.35); c.lineTo(x+sc*0.1,y+sc*0.35); c.lineTo(x+sc*0.12,y-sc*0.18); c.closePath(); c.stroke();
  // Folded wings
  c.lineWidth=0.9;
  c.beginPath(); c.moveTo(x-sc*0.12,y-sc*0.05); c.bezierCurveTo(x-sc*0.45,y-sc*0.2,x-sc*0.5,y+sc*0.1,x-sc*0.18,y+sc*0.2); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.12,y-sc*0.05); c.bezierCurveTo(x+sc*0.45,y-sc*0.2,x+sc*0.5,y+sc*0.1,x+sc*0.18,y+sc*0.2); c.stroke();
  // Spiked forelegs
  c.lineWidth=1.1;
  c.beginPath(); c.moveTo(x-sc*0.15,y-sc*0.12); c.lineTo(x-sc*0.42,y-sc*0.32); c.lineTo(x-sc*0.36,y-sc*0.5); c.stroke();
  c.beginPath(); c.moveTo(x-sc*0.38,y-sc*0.34); c.lineTo(x-sc*0.5,y-sc*0.3); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.15,y-sc*0.12); c.lineTo(x+sc*0.42,y-sc*0.32); c.lineTo(x+sc*0.36,y-sc*0.5); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.38,y-sc*0.34); c.lineTo(x+sc*0.5,y-sc*0.3); c.stroke();
  // Eyes
  c.fillStyle=col;
  c.beginPath(); c.arc(x-sc*0.08,y-sc*0.36,sc*0.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.08,y-sc*0.36,sc*0.07,0,Math.PI*2); c.fill();
}

// Type 5: Boss moth — big wingspan, skull pattern, antenna
function drawMoth(c,x,y,s,col,t){
  c.strokeStyle=col; c.lineWidth=1.3;
  const sc=s;
  const flap=Math.sin(t*0.006)*sc*0.06;
  // Upper wings
  c.beginPath();
  c.moveTo(x-sc*0.08,y-sc*0.05+flap);
  c.bezierCurveTo(x-sc*0.55,y-sc*0.45+flap,x-sc*0.7,y-sc*0.05,x-sc*0.42,y+sc*0.15);
  c.lineTo(x-sc*0.1,y+sc*0.05); c.stroke();
  c.beginPath();
  c.moveTo(x+sc*0.08,y-sc*0.05+flap);
  c.bezierCurveTo(x+sc*0.55,y-sc*0.45+flap,x+sc*0.7,y-sc*0.05,x+sc*0.42,y+sc*0.15);
  c.lineTo(x+sc*0.1,y+sc*0.05); c.stroke();
  // Lower wings (smaller)
  c.lineWidth=1;
  c.beginPath();
  c.moveTo(x-sc*0.1,y+sc*0.05);
  c.bezierCurveTo(x-sc*0.4,y+sc*0.12,x-sc*0.38,y+sc*0.42,x-sc*0.1,y+sc*0.32);
  c.stroke();
  c.beginPath();
  c.moveTo(x+sc*0.1,y+sc*0.05);
  c.bezierCurveTo(x+sc*0.4,y+sc*0.12,x+sc*0.38,y+sc*0.42,x+sc*0.1,y+sc*0.32);
  c.stroke();
  // Body
  c.lineWidth=1.3;
  c.beginPath(); c.ellipse(x,y+sc*0.12,sc*0.1,sc*0.28,0,0,Math.PI*2); c.stroke();
  // Skull dots on wings
  c.fillStyle=col; c.globalAlpha*=0.6;
  c.beginPath(); c.arc(x-sc*0.35,y-sc*0.1,sc*0.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.35,y-sc*0.1,sc*0.07,0,Math.PI*2); c.fill();
  c.globalAlpha=1;
  // Antennae
  c.lineWidth=0.9;
  c.beginPath(); c.moveTo(x-sc*0.06,y-sc*0.28); c.quadraticCurveTo(x-sc*0.25,y-sc*0.55,x-sc*0.18,y-sc*0.7); c.stroke();
  c.beginPath(); c.moveTo(x+sc*0.06,y-sc*0.28); c.quadraticCurveTo(x+sc*0.25,y-sc*0.55,x+sc*0.18,y-sc*0.7); c.stroke();
  c.fillStyle=col;
  c.beginPath(); c.arc(x-sc*0.18,y-sc*0.72,sc*0.05,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+sc*0.18,y-sc*0.72,sc*0.05,0,Math.PI*2); c.fill();
}

const ENEMY_DRAWS=[drawBeetle,drawHornet,drawCrab,drawSpider,drawMantis,drawMoth];

// ── PLAYER SHIP — detailed with turbine glow ──
function drawPlayer(x,y,alpha,t){
  const w=PLAYER_W, h=PLAYER_H;
  const col='rgba(255,255,255,'+alpha+')';

  // === Turbine glow (drawn first, behind ship) ===
  const turbineY=y+h*0.42;
  const glow1=ctx.createRadialGradient(x-w*0.22,turbineY,0,x-w*0.22,turbineY,w*0.28);
  glow1.addColorStop(0,'rgba(255,255,255,0.55)');
  glow1.addColorStop(0.3,'rgba(200,220,255,0.25)');
  glow1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow1;
  ctx.beginPath(); ctx.arc(x-w*0.22,turbineY,w*0.28,0,Math.PI*2); ctx.fill();

  const glow2=ctx.createRadialGradient(x+w*0.22,turbineY,0,x+w*0.22,turbineY,w*0.28);
  glow2.addColorStop(0,'rgba(255,255,255,0.55)');
  glow2.addColorStop(0.3,'rgba(200,220,255,0.25)');
  glow2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow2;
  ctx.beginPath(); ctx.arc(x+w*0.22,turbineY,w*0.28,0,Math.PI*2); ctx.fill();

  // Turbine exhaust flicker
  const flicker=0.7+Math.sin(t*0.18)*0.3;
  ctx.globalAlpha=alpha*flicker;
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.ellipse(x-w*0.22,turbineY+h*0.06,w*0.07,h*(0.06+Math.sin(t*0.25)*0.03),0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*0.22,turbineY+h*0.06,w*0.07,h*(0.06+Math.sin(t*0.25+1)*0.03),0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=alpha;

  ctx.strokeStyle=col;
  ctx.lineWidth=1.4*R;

  // === Main hull ===
  ctx.beginPath();
  ctx.moveTo(x, y-h*0.5);           // nose tip
  ctx.lineTo(x+w*0.12, y-h*0.25);   // nose right
  ctx.lineTo(x+w*0.18, y-h*0.05);   // cockpit right
  ctx.lineTo(x+w*0.28, y+h*0.05);   // wing root right
  ctx.lineTo(x+w*0.5,  y+h*0.32);   // wing tip right
  ctx.lineTo(x+w*0.34, y+h*0.42);   // wing trailing right
  ctx.lineTo(x+w*0.24, y+h*0.35);   // engine nacelle outer right
  ctx.lineTo(x+w*0.28, y+h*0.48);   // nacelle bottom right
  ctx.lineTo(x+w*0.16, y+h*0.48);   // nacelle inner right
  ctx.lineTo(x+w*0.16, y+h*0.36);   // center body right
  ctx.lineTo(x+w*0.08, y+h*0.36);   // center
  ctx.lineTo(x,        y+h*0.44);   // tail center dip
  ctx.lineTo(x-w*0.08, y+h*0.36);
  ctx.lineTo(x-w*0.16, y+h*0.36);
  ctx.lineTo(x-w*0.16, y+h*0.48);
  ctx.lineTo(x-w*0.28, y+h*0.48);
  ctx.lineTo(x-w*0.24, y+h*0.35);
  ctx.lineTo(x-w*0.34, y+h*0.42);
  ctx.lineTo(x-w*0.5,  y+h*0.32);
  ctx.lineTo(x-w*0.28, y+h*0.05);
  ctx.lineTo(x-w*0.18, y-h*0.05);
  ctx.lineTo(x-w*0.12, y-h*0.25);
  ctx.closePath();
  ctx.stroke();

  // === Cockpit canopy ===
  ctx.lineWidth=1*R;
  ctx.beginPath();
  ctx.moveTo(x-w*0.1, y-h*0.2);
  ctx.quadraticCurveTo(x, y-h*0.46, x+w*0.1, y-h*0.2);
  ctx.quadraticCurveTo(x+w*0.13, y-h*0.08, x, y-h*0.06);
  ctx.quadraticCurveTo(x-w*0.13, y-h*0.08, x-w*0.1, y-h*0.2);
  ctx.stroke();

  // Cockpit fill glow
  ctx.globalAlpha=alpha*0.15;
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(x-w*0.09,y-h*0.2);
  ctx.quadraticCurveTo(x,y-h*0.44,x+w*0.09,y-h*0.2);
  ctx.quadraticCurveTo(x,y-h*0.07,x-w*0.09,y-h*0.2);
  ctx.fill();
  ctx.globalAlpha=alpha;

  // === Wing detail lines ===
  ctx.lineWidth=0.7*R;
  ctx.globalAlpha=alpha*0.5;
  // Right wing stripe
  ctx.beginPath(); ctx.moveTo(x+w*0.28,y+h*0.05); ctx.lineTo(x+w*0.46,y+h*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w*0.28,y+h*0.15); ctx.lineTo(x+w*0.42,y+h*0.3); ctx.stroke();
  // Left wing stripe
  ctx.beginPath(); ctx.moveTo(x-w*0.28,y+h*0.05); ctx.lineTo(x-w*0.46,y+h*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-w*0.28,y+h*0.15); ctx.lineTo(x-w*0.42,y+h*0.3); ctx.stroke();
  ctx.globalAlpha=alpha;

  // === Engine nacelles (outline) ===
  ctx.lineWidth=1*R;
  ctx.beginPath(); ctx.ellipse(x+w*0.22,y+h*0.41,w*0.08,h*0.07,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x-w*0.22,y+h*0.41,w*0.08,h*0.07,0,0,Math.PI*2); ctx.stroke();

  // === Center hull line ===
  ctx.lineWidth=0.6*R;
  ctx.globalAlpha=alpha*0.4;
  ctx.beginPath(); ctx.moveTo(x,y-h*0.48); ctx.lineTo(x,y+h*0.36); ctx.stroke();
  ctx.globalAlpha=alpha;
}

// ── State ──
let playerHitCooldown=0;
let formDir=1,formX=0,formDescentOffset=0;
const FORM_RANGE=IS_RETINA?55:38;
const DESCENT_FRAMES=480;
let descentFrame=0;

function initGame(){
  player={x:W/2,y:H-90,speed:4*R,w:PLAYER_W,h:PLAYER_H};
  bullets=[];enemyBullets=[];particles=[];
  waveClearing=false;
  computeWaveParams();spawnEnemies();
}

function spawnEnemies(){
  enemies=[];formDescentOffset=0;descentFrame=0;
  const cols=8+Math.min(wave-1,4);
  const rows=3+Math.min(Math.floor((wave-1)/2),3);
  const spacing=IS_RETINA?68:46;
  const offX=(W-(cols-1)*spacing)/2;
  const offY=IS_RETINA?105:76;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      // Row 0=moths(boss), row1=mantis, row2=crab, row3=spider, row4=hornet, rest=beetle
      const typeMap=[5,4,2,3,1,0];
      const type=typeMap[Math.min(r,typeMap.length-1)];
      enemies.push({
        x:offX+c*spacing,y:offY+r*spacing,
        baseX:offX+c*spacing,baseY:offY+r*spacing,
        type,hp:r===0?3:r===1?2:1,
        diving:false,diveAngle:0,diveSpeed:0,
        shootTimer:waveShootMin+Math.random()*D.shootRnd+(r+c)*18,
        phase:Math.random()*Math.PI*2,
        alive:true,animT:Math.random()*1000
      });
    }
  }
}

function updateEnemies(t){
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){waveClearing=true;return;}
  formX+=waveFormSpeed*formDir;
  if(Math.abs(formX)>FORM_RANGE)formDir*=-1;
  if(descentFrame<DESCENT_FRAMES){descentFrame++;formDescentOffset=(descentFrame/DESCENT_FRAMES)*D.descentPx;}
  alive.forEach(e=>{
    e.animT++;
    if(!e.diving){
      e.x=e.baseX+formX;
      e.y=e.baseY+formDescentOffset+Math.sin(t*0.001+e.phase)*3;
      if(Math.random()<waveDiveChance&&!waveClearing){
        e.diving=true;
        e.diveAngle=Math.atan2(player.y-e.y,player.x-e.x);
        e.diveSpeed=2*R;
      }
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=waveShootMin+Math.random()*D.shootRnd;
        enemyBullets.push({x:e.x,y:e.y+ENEMY_SIZE*0.6,vy:waveBulletSpd});
      }
    } else {
      e.x+=Math.cos(e.diveAngle)*e.diveSpeed;
      e.y+=Math.sin(e.diveAngle)*e.diveSpeed;
      e.diveSpeed+=0.04;
      if(e.y>H+60||e.x<-60||e.x>W+60){
        e.diving=false;e.x=e.baseX+formX;e.y=e.baseY+formDescentOffset;e.diveSpeed=2*R;
      }
    }
  });
}

function updateBullets(){
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=12*R);
  enemyBullets=enemyBullets.filter(b=>b.y<H+20);
  enemyBullets.forEach(b=>b.y+=b.vy);
}

function spawnParticles(x,y,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.035+Math.random()*0.03});
  }
}

function checkCollisions(){
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(b.x-e.x)<ENEMY_SIZE*0.5&&Math.abs(b.y-e.y)<ENEMY_SIZE*0.5){
        b.dead=true;e.hp--;
        if(e.hp<=0){
          e.alive=false;
          score+=(e.type===5?300:e.type===4?200:e.type===3?180:e.type===2?160:e.type===1?130:100);
          spawnParticles(e.x,e.y,12);updateHUD();
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);
  enemyBullets.forEach(b=>{
    if(Math.abs(b.x-player.x)<player.w*0.38&&Math.abs(b.y-player.y)<player.h*0.38){b.dead=true;hitPlayer();}
  });
  enemyBullets=enemyBullets.filter(b=>!b.dead);
  enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    if(Math.abs(e.x-player.x)<(player.w+ENEMY_SIZE)*0.36&&Math.abs(e.y-player.y)<(player.h+ENEMY_SIZE)*0.36){
      e.alive=false;spawnParticles(e.x,e.y,10);hitPlayer();
    }
  });
  enemies.forEach(e=>{if(e.alive&&e.y>H-player.h*2){e.alive=false;spawnParticles(e.x,e.y,6);}});
}

function hitPlayer(){
  if(playerHitCooldown>0)return;
  lives--;playerHitCooldown=120;
  spawnParticles(player.x,player.y,18);updateHUD();
  if(lives<=0)setTimeout(()=>showScreen('over'),400);
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.95;p.vy*=0.95;});
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-val').textContent=wave;
  const lv=document.getElementById('lives-val');lv.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','14');svg.setAttribute('height','16');svg.setAttribute('viewBox','0 0 32 38');svg.style.opacity='0.7';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','16,2 20,10 28,12 22,18 24,28 16,22 8,28 10,18 4,12 12,10');
    p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');
    svg.appendChild(p);lv.appendChild(svg);
  }
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  // Stars
  for(let i=0;i<(IS_RETINA?130:88);i++){
    const sx=Math.abs((Math.sin(i*127.1)*43758.5453)%1)*W;
    const sy=Math.abs((Math.sin(i*311.7)*43758.5453)%1)*H;
    const ss=(Math.sin(i*91.3)*0.5+0.5)*1.8+0.3;
    ctx.globalAlpha=(Math.sin(t*0.001+i)*0.3+0.5)*0.55;
    ctx.fillStyle='#fff';ctx.fillRect(sx,sy,ss,ss);
  }
  ctx.globalAlpha=1;

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life*0.85;ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,2,2);});
  ctx.globalAlpha=1;

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    const bri=e.hp>2?1:e.hp>1?0.85:0.65;
    const col=`rgba(255,255,255,${bri})`;
    ctx.save();
    ctx.shadowBlur=e.hp>1?14:5;
    ctx.shadowColor=`rgba(255,255,255,${bri*0.7})`;
    ctx.globalAlpha=bri;
    ENEMY_DRAWS[e.type](ctx,e.x,e.y,ENEMY_SIZE,col,e.animT);
    ctx.restore();
    ctx.globalAlpha=1;
  });

  // Player bullets
  bullets.forEach(b=>{
    ctx.fillStyle='#fff';ctx.shadowBlur=10;ctx.shadowColor='rgba(255,255,255,0.9)';
    ctx.fillRect(b.x-BULLET_W/2,b.y-BULLET_H/2,BULLET_W,BULLET_H);
  });
  ctx.shadowBlur=0;

  // Enemy bullets — slightly different shape (wider)
  enemyBullets.forEach(b=>{
    ctx.fillStyle='rgba(210,210,210,0.85)';ctx.shadowBlur=5;ctx.shadowColor='rgba(255,255,255,0.4)';
    ctx.fillRect(b.x-BULLET_W*0.8,b.y,BULLET_W*1.6,BULLET_H*0.65);
  });
  ctx.shadowBlur=0;

  // Player
  const flicker=playerHitCooldown>0&&Math.floor(playerHitCooldown/7)%2===0;
  if(!flicker){
    ctx.shadowBlur=16;ctx.shadowColor='rgba(255,255,255,0.45)';
    drawPlayer(player.x,player.y,1,t);
    ctx.shadowBlur=0;
  }
}

function gameLoop(t){
  if(state!=='play'){frameId=null;return;}
  const spd=player.speed*(keys['Shift']?1.6:1);
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.x=Math.max(player.w/2,player.x-spd);
  if(keys['ArrowRight']||keys['d']||keys['D'])player.x=Math.min(W-player.w/2,player.x+spd);
  if((keys[' ']||keys['Space'])&&t-lastShot>SHOT_COOLDOWN){lastShot=t;bullets.push({x:player.x,y:player.y-player.h/2});}
  if(playerHitCooldown>0)playerHitCooldown--;
  updateEnemies(t);updateBullets();updateParticles();checkCollisions();draw(t);
  if(waveClearing){waveClearing=false;setTimeout(()=>showScreen('win'),600);return;}
  frameId=requestAnimationFrame(gameLoop);
}

function showScreen(s){
  state=s;
  ['start-screen','over-screen','win-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display=s==='play'?'flex':'none';
  if(s==='over'){document.getElementById('over-screen').style.display='flex';document.getElementById('final-score').textContent=`SCORE · ${score}   WAVE · ${wave}`;}
  else if(s==='win'){document.getElementById('win-screen').style.display='flex';document.getElementById('win-score').textContent=`SCORE · ${score}   WAVE · ${wave} COMPLETE`;}
  else if(s==='play'){state='play';if(!frameId)frameId=requestAnimationFrame(gameLoop);}
}

function startGame(){
  D=DIFF[difficulty];score=0;wave=1;lives=D.lives;
  formX=0;formDir=1;descentFrame=0;formDescentOffset=0;
  playerHitCooldown=0;
  updateHUD();initGame();showScreen('play');
}

function nextWave(){
  wave++;formX=0;formDir=1;descentFrame=0;formDescentOffset=0;
  bullets=[];enemyBullets=[];particles=[];waveClearing=false;
  computeWaveParams();updateHUD();spawnEnemies();showScreen('play');
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{document.getElementById('over-screen').style.display='none';document.getElementById('start-screen').style.display='flex';};
document.getElementById('next-btn').onclick=nextWave;

window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>keys[e.key]=false);

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(player&&state==='play')player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.5));
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',()=>{if(state==='play')bullets.push({x:player.x,y:player.y-player.h/2});});

updateHUD();
</script>
